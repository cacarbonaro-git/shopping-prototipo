function notificacoesMorador(){
  const out=[];
  const enc=encomendas.find(e=>e.un===MORADOR.un&&e.status==='aguardando');
  if(enc) out.push({ic:'pacote', t:'Entrega na doca', sub:`${enc.transp} · chegou ${enc.chegada}`, q:enc.chegada, lida:false, go:`irPara('mhome')`});
  if(enquete.ativa&&enquete.votou===null) out.push({ic:'grafico', t:'Enquete aberta', sub:`"${enquete.q}" — seu voto conta`, q:'', lida:false, go:`irPara('mhome')`});
  if(!MORADOR.emDia) out.push({ic:'cifrao', t:'Taxa em aberto', sub:'Toque pra gerar o PIX / 2ª via', q:'', lida:false, go:`minhaTaxa()`});
  avisosDoMorador().forEach(a=>{const ix=avisos.indexOf(a); const lida=(a.lidoPor||[]).includes(MORADOR.un);
    out.push({ic:'megafone', t:a.t, sub:a.d, q:a.quando, lida, go:`confirmarLeitura(${ix})`});});
  const ref=ocorrencias.find(o=>o.un===MORADOR.un&&o.tipo==='Reforma'&&o.status==='em execução');
  if(ref) out.push({ic:'martelo', t:'Sua reforma foi aprovada', sub:ref.titulo, q:ref.quando, lida:true, go:`irPara('mfalar')`});
  const res=proximasReservas(99).filter(r=>r.un===MORADOR.un)[0];
  if(res) out.push({ic:'calendario', t:'Reserva confirmada', sub:`${res.area} · ${String(res.d).padStart(2,'0')}/${String(res.m).padStart(2,'0')}`, q:'', lida:true, go:`irPara('mreservar')`});
  return out;
}

  const linha=c=>{

      <div class="linha1"><span class="nome">${c.nome}</span><span class="chip ${cor}">${rot}</span></div>
      <div class="sub" style="margin-top:5px; display:flex; gap:6px; flex-wrap:wrap">
        <span class="chip ${semSind?'vermelho':'verde'}" style="border:none; font-size:.68rem">${semSind?'sem superintendente':'superintendente ativo'}</span>
        <span class="chip ${ediOk?'verde':'laranja'}" style="border:none; font-size:.68rem">${nomeAssist}: ${c.edi} dúvidas/mês</span>
      </div>
      ${risco?`<div class="sub" style="margin-top:5px; color:var(--vermelho)">${semSind?'Cargo de superintendente vago — a adoção trava sem dono. Indicar gestor ou assumir a gestão.':'Uso baixo do '+nomeAssist+' — lojistas ainda ligam na administradora. Reforçar onboarding e comunicar o canal.'}</div>`:''}
    </div>`;};
  const ordenada=[...carteira].sort((a,b)=>(adocaoRisco(b)-adocaoRisco(a))||(a.edi-b.edi));
  const emRisco=carteira.filter(adocaoRisco).length;
  abrirModal(`<h3>${tIco('grafico')}Saúde de adoção da carteira</h3>
    <div class="sub" style="margin-bottom:10px">${emRisco?`${emRisco} shopping(s) em risco de baixa adoção — aja antes de virar churn.`:'Carteira toda engajada.'}</div>
    ${ordenada.map(linha).join('')}
    <div class="aviso-lgpd">Adoção é o que segura o cliente: shopping que não usa não renova. A administradora intervém onde o engajamento cai — antes de perder o contrato.</div>`);
}

TELAS.carteira = () => {
  const tUn=carteira.reduce((s,c)=>s+c.un,0);
  const inadMed=Math.round(carteira.reduce((s,c)=>s+c.inadPct,0)/carteira.length);
  const tEdi=carteira.reduce((s,c)=>s+c.edi,0);
  const alertas=carteira.filter(c=>c.status!=='ok').length;
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("predio")}Carteira</h1><p>Grupo Malls Brasil · ${carteira.length} shoppings · ${tUn} lojas</p></div>
  <div class="cards">
<div class="card"><div class="num">${tUn}</div><div class="lbl">lojas</div></div>
    <button class="card ${inadMed>15?'aten':'ok'}" onclick="irPara('admcobranca')"><div class="num">${inadMed}%</div><div class="lbl">inadimplência média ›</div></button>
${alertas?`<button class="card alerta" onclick="verAlertas()"><div class="num">${alertas}</div><div class="lbl">shoppings em alerta ›</div></button>`:`<div class="card ok"><div class="num">0</div><div class="lbl">shoppings em alerta</div></div>`}
  </div>
  <button class="item" style="width:100%; text-align:left; display:block; margin:4px 0 8px" onclick="verAdocao()">
    <div class="linha1"><span class="nome">${tIco('grafico')}Saúde de adoção</span><span class="chip ${carteira.filter(adocaoRisco).length?'laranja':'verde'}">${carteira.filter(adocaoRisco).length?carteira.filter(adocaoRisco).length+' em risco':'tudo engajado'} ›</span></div>
    <div class="sub" style="margin-top:5px">Quem usa e quem está esfriando — agir antes do churn (renovação do contrato).</div></button>
  <button class="item" style="width:100%; text-align:left; display:block; margin:0 0 14px" onclick="irPara('integracoes')">
    <div class="linha1"><span class="nome">${tIco('importar')}Integrações da carteira</span><span class="chip ${integracoes.filter(i=>i.status==='pendente'||i.status==='erro').length?'laranja':'verde'}">padrão ›</span></div>
    <div class="sub" style="margin-top:5px">WhatsApp, banco e ERP num lugar — define o padrão da carteira; cada shopping sobrescreve o que é local.</div></button>
  <div class="secao">SEUS SHOPPINGS</div>
  <button class="btn claro btn-grande" style="margin-bottom:10px" onclick="adicionarCondoAdm()">+ Adicionar shopping à carteira</button>
  ${carteira.map((c,ix)=>{const [cor,rot]=SEM[c.status];
    return `<button class="item" style="width:100%; text-align:left; display:block; border-left:4px solid var(--${cor})" onclick="verCondo(${ix})">
    <div class="linha1"><span class="nome">${c.nome}${c.atual?' <span class="chip verde" style="border:none">demo</span>':''}</span><span class="chip ${cor}">${rot}</span></div>
    <div class="sub" style="margin-top:5px">${c.cidade} · ${c.un} lojas · superintendente: ${c.sindico}</div>
    <div class="sub" style="margin-top:4px">Inadimplência ${c.inadPct}% (${fmt(c.inad)}) · ${c.ocor} ocorrências · ${c.manut} manut. vencida(s)</div>
  </button>`;}).join('')}
  <div class="aviso-lgpd" style="margin-top:6px">Visão da administradora: indicadores operacionais da carteira. O financeiro nasce no ERP (boleto/cobrança) e é espelhado aqui — cada superintendente enxerga só o próprio shopping.</div>
</div>`;
};
/* administradora cadastra um shopping novo e segue pro assistente de configuração */
function adicionarCondoAdm(){
  abrirModal(`<h3>${tIco("predio")}Adicionar shopping à carteira</h3>
    <div class="sub" style="margin-bottom:10px">Cadastre o shopping e siga o mesmo assistente do superintendente — a administradora faz o setup inicial pelo cliente.</div>
    <label>Nome do shopping</label><input id="ac-nome" placeholder="Ex.: Shopping Primavera">
    <div style="display:flex; gap:10px">
      <div style="flex:1"><label>Cidade</label><input id="ac-cidade" placeholder="Ex.: Osasco"></div>
      <div style="flex:0 0 40%"><label>Lojas</label><input id="ac-un" type="number" inputmode="numeric" placeholder="Ex.: 48"></div>
    </div>
    <button class="btn principal btn-grande" onclick="iniciarSetupCondoAdm()">Configurar agora →</button>`);
}
function iniciarSetupCondoAdm(){
  const nome=($('#ac-nome').value||'').trim();
  if(!nome){ toast('Informe o nome do shopping.'); return; }
  obNovo={nome, cidade:($('#ac-cidade').value||'').trim()||'—', un:parseInt($('#ac-un').value,10)||0};
  obEditIx=-1; obCond={nome, lojas:obNovo.un, rateio:'', pix:'', venc:''};
  fecharModal(); irOnboarding('administradora');
}
/* ===== administradora dentro de um shopping: barra de contexto + trocar ===== */
function bannerAdmContexto(){
  return `<div class="adm-ctx">
    <span style="display:inline-flex; align-items:center; gap:6px">${tIco('predio')}Gerido pela administradora · <b>${admContexto.nome}</b></span>
    <span class="acts">
      <button onclick="trocarCondoAdm()">⇄ Trocar shopping</button>
      <button onclick="voltarCarteira()">← Carteira</button>
    </span>
  </div>`;
}
/* abre um shopping da carteira como painel do superintendente, guardando o contexto */
function abrirCondoComoSindico(ix){
  const c=carteira[ix]; fecharModal();
  trocarPerfil('sindico');          /* zera o contexto... */
  admContexto={ix, nome:c.nome};    /* ...e marca de novo qual shopping estamos vendo */
  irPara(MENUS.sindico[0][0]);      /* re-renderiza a home já com a barra de contexto */
  if(!c.atual) toast(`No produto, carrega os dados do ${c.nome}. Nesta demo o painel mostra o Pátio Central.`);
}
/* picker para trocar de shopping sem voltar à carteira */
function trocarCondoAdm(){
  abrirModal(`<h3>${tIco("predio")}Trocar de shopping</h3>
    <div class="sub" style="margin-bottom:10px">Você está gerindo um shopping da carteira. Escolha outro para abrir o painel dele.</div>
    ${carteira.map((c,ix)=>{const [cor,rot]=SEM[c.status]; const atual=admContexto&&admContexto.ix===ix;
      return `<button class="item" style="width:100%; text-align:left; display:block${atual?'; border-color:var(--verde)':''}" onclick="abrirCondoComoSindico(${ix})">
        <div class="linha1"><span class="nome">${c.nome}</span>${atual?'<span class="chip verde" style="border:none">vendo agora</span>':`<span class="chip ${cor}">${rot}</span>`}</div>
        <div class="sub">${c.cidade} · ${c.un} lojas · inadimplência ${c.inadPct}%</div>
      </button>`;}).join('')}
    <button class="btn principal btn-grande" onclick="fecharModal()">Fechar</button>`);
}
function voltarCarteira(){ admContexto=null; trocarPerfil('administradora'); irPara('carteira'); }

/* administradora reconfigura um shopping que já está na carteira */
function configurarCondoAdm(ix){
  const c=carteira[ix]; obEditIx=ix; obNovo=null;
  obCond={nome:c.nome, lojas:c.un, rateio:'', pix:'', venc:''};
  fecharModal(); irOnboarding('administradora');
}
function verCondo(ix){
  const c=carteira[ix]; const [cor,rot]=SEM[c.status];
  abrirModal(`<h3>${tIco("predio")}${c.nome}</h3>
    <div class="linha1" style="margin-bottom:10px"><span class="sub">${c.cidade} · ${c.un} lojas · superintendente: ${c.sindico}</span><span class="chip ${cor}">${rot}</span></div>
    <div class="cards" style="margin-bottom:6px">
      <div class="card ${c.inadPct>15?'aten':'ok'}"><div class="num">${c.inadPct}%</div><div class="lbl">inadimplência</div></div>
      <div class="card ${c.manut?'alerta':'ok'}"><div class="num">${c.manut}</div><div class="lbl">manut. vencida(s)</div></div>
      <div class="card ${c.ocor>5?'aten':'ok'}"><div class="num">${c.ocor}</div><div class="lbl">ocorrências</div></div>
    </div>
    <div class="item"><div class="linha1"><span class="nome">Caixa do shopping</span><span class="chip ${c.caixa<10000?'vermelho':'verde'}">${fmt(c.caixa)}</span></div>
    <div class="sub" style="margin-top:4px">Dúvidas resolvidas pelo ${nomeAssist} este mês: <b>${c.edi}</b> — atendimento que não caiu na administradora.</div></div>
    <button class="btn principal btn-grande" onclick="abrirCondoComoSindico(${ix})">Abrir o painel deste shopping →</button>
    <button class="btn claro btn-grande" style="margin-top:8px" onclick="configurarCondoAdm(${ix})">${tIco('engrenagem')}Configurar este shopping</button>
    <div class="aviso-lgpd" style="margin-top:10px">A administradora vê o resumo de saúde; ao abrir, entra no painel do superintendente daquele shopping — sem misturar dados entre shoppings.</div>`);
}
function verAlertas(){
  const alt=carteira.map((c,ix)=>({c,ix})).filter(x=>x.c.status!=='ok');
  abrirModal(`<h3>${tIco('predio')}Shoppings em alerta (${alt.length})</h3>
    <div class="sub" style="margin-bottom:10px">Shoppings da carteira que pedem atenção — toque pra abrir a ficha.</div>
    ${alt.map(({c,ix})=>{const [cor,rot]=SEM[c.status];
      return `<button class="item" style="width:100%; text-align:left; display:block; border-left:4px solid var(--${cor})" onclick="verCondo(${ix})"><div class="linha1"><span class="nome">${c.nome}</span><span class="chip ${cor}">${rot}</span></div><div class="sub" style="margin-top:4px">${c.cidade} · inadimplência ${c.inadPct}% · ${c.manut} manut. vencida(s) · ${c.ocor} ocorrências</div></button>`;}).join('')||vazio('check','Tudo certo','Nenhum shopping em alerta agora.')}`);
}

TELAS.admcobranca = () => {
  const ordenada=[...carteira].sort((a,b)=>b.inadPct-a.inadPct);
  const tInad=carteira.reduce((s,c)=>s+c.inad,0);
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("cifrao")}Cobrança da carteira</h1><p>${fmt(tInad)} a recuperar · espelho do ERP</p></div>
  <div class="secao">INADIMPLÊNCIA POR SHOPPING</div>
  ${ordenada.map(c=>{const ix=carteira.indexOf(c); const k=c.inadPct>15?'vermelho':c.inadPct>10?'laranja':'verde';
    return `<button class="item" style="width:100%; text-align:left; display:block" onclick="verCondo(${ix})"><div class="linha1"><span class="nome">${c.nome}</span><span style="display:flex; align-items:center; gap:6px"><span class="chip ${k}">${c.inadPct}%</span><span style="color:var(--cinza)">›</span></span></div>
    <div class="cat-trilha" style="margin-top:8px; height:8px"><div class="cat-barra" style="width:${Math.min(c.inadPct*2.5,100)}%; background:var(--${k})"></div></div>
    <div class="sub" style="margin-top:5px">${fmt(c.inad)} em aberto · ${c.cidade}</div></button>`;}).join('')}
  <div class="aviso-lgpd" style="margin-top:6px">O boleto e a régua de cobrança rodam no ERP da administradora. O app só espelha o resultado e dá transparência ao superintendente e ao conselho — nunca expõe nome de inadimplente ao lojista (LGPD).</div>
</div>`;
};

TELAS.admatend = () => {
  const tEdi=carteira.reduce((s,c)=>s+c.edi,0);
  const ordenada=[...carteira].sort((a,b)=>b.edi-a.edi);
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("balao")}Atendimento</h1><p>O quanto o ${nomeAssist} tira do seu telefone</p></div>
  <div class="cards">
<div class="card ok"><div class="num">${tEdi}</div><div class="lbl">dúvidas resolvidas no mês</div></div>
<div class="card ok"><div class="num">~${Math.round(tEdi*0.6)}</div><div class="lbl">contatos evitados (est.)</div></div>
  </div>
  <div class="secao">POR SHOPPING</div>
  <div class="sub" style="margin:-4px 0 10px">O ${nomeAssist} é treinado no contrato de locação, no regimento e nas atas de cada shopping — responde o lojista citando o artigo, em vez de cair no seu WhatsApp.</div>
  ${ordenada.map(c=>{const ix=carteira.indexOf(c);
    return `<button class="item" style="width:100%; text-align:left; display:block" onclick="verCondo(${ix})"><div class="linha1"><span class="nome">${c.nome}</span><span style="display:flex; align-items:center; gap:6px"><span class="chip verde">${c.edi} resolvidas</span><span style="color:var(--cinza)">›</span></span></div></button>`;}).join('')}
  <div class="aviso-lgpd" style="margin-top:6px">Atendimento é o maior custo de uma administradora. Quanto mais o ${nomeAssist} resolve sozinho, menor o custo por loja — e maior a satisfação que segura o cliente.</div>
</div>`;
};

TELAS.mavisos = () => `<div class="tela on">
  <div class="topo"><h1>${tIco("megafone")}Avisos do shopping</h1><p>Você só recebe o que vale pra sua piso</p></div>
  ${enqueteHtml()}
  ${avisos.map((a,ix)=>({a,ix})).filter(x=>x.a.piso==='todas'||x.a.piso===daPiso(MORADOR.un)).map(({a,ix})=>{
    const lido=(a.lidoPor||[]).includes(MORADOR.un);
    return `<div class="item"><div class="linha1"><span class="nome">${a.t}</span><span style="display:flex; gap:5px">${a.cat==='operação'?'<span class="chip cinza">operação</span>':''}<span class="chip ${a.piso==='todas'?'cinza':'laranja'}">${a.piso==='todas'?'todos os pisos':'Piso '+a.piso}</span><span class="chip cinza">${a.quando}</span></span></div><div class="sub">${a.d}</div>
    <div class="sub" style="margin-top:3px; font-size:.78rem">por ${a.autor||'Superintendente'}</div>
    ${a.anexo?`<div class="sub" style="margin-top:4px">${clip()}documento anexado</div>`:''}
    <div class="botoes"><button class="btn claro" ${lido?'disabled style="opacity:.6"':''} onclick="confirmarLeitura(${ix})">${lido?tIco('check')+'Lido':'Confirmar leitura'}</button></div></div>`;}).join('')||vazio('megafone','Nenhum aviso pra sua piso','Quando o superintendente ou a segurança publicar algo da sua piso, aparece aqui.')}
</div>`;

/* ---------- início: tela de login ---------- */
$('#edi-fab').innerHTML = ediMini;
{const sv=$('#versao-selo'); if(sv) sv.textContent=VERSAO;}
$('#app').innerHTML = TELAS.login();

/* o conteúdo nunca fica atrás da barra: mede a altura real dela (1 ou 2 linhas,
   texto normal ou Aa+, com notch ou sem) e ajusta o topo do app na hora */
function ajustarTopo(){
  const b=document.getElementById('demobar'), a=document.getElementById('app');
  if(b&&a) a.style.paddingTop=(b.offsetHeight+6)+'px';
}
if(window.ResizeObserver) new ResizeObserver(ajustarTopo).observe(document.getElementById('demobar'));
window.addEventListener('resize', ajustarTopo);
ajustarTopo();
/* perfil definido logo no início: abre a escolha de perfil sobre o login */
menuDemo();
</script>
