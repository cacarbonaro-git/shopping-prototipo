<style>
  :root{
    --verde:#0E7490; --verde-claro:#DCF0F2; --verde-escuro:#0A4E5C;
    --ok:#0e7a5f; --ok-claro:#e6f4f0; --ok-escuro:#0a5c48;
    --gold:#FF6B4A;
    --laranja:#e07b00; --laranja-txt:#9a5400; --vermelho:#c0392b; --vermelho-claro:#fdecea;
    --amarelo-claro:#fef5e7; --cinza:#4b5563; --cinza-claro:#f3f4f6;
    --borda:#e5e7eb; --texto:#1f2937; --branco:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#eef1f4; color:var(--texto); font-size:1rem}
  /* texto grande: a classe vai no <html> porque os tamanhos do app são em rem
     (rem = fonte do elemento raiz; no body não escala nada) */
  html.txt-grande{font-size:19px}
  /* color explícita: botão herda preto do navegador por padrão — invisível no tema dark */
  button{font-family:inherit; font-size:1rem; cursor:pointer; border:none; border-radius:10px; color:var(--texto)}
  /* acessibilidade: foco visível para teclado e leitores */
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--verde); outline-offset:2px}
  /* chips que são botões precisam de alvo de toque ≥44px (WCAG 2.5.8) */
  button.chip{padding:11px 14px; font-size:.85rem}

  /* barra de demonstração */
  /* em telas estreitas a barra QUEBRA em duas linhas — rolagem horizontal esconde botões sem dar pista (bug: Lojista sumia no iPhone) */
  #demobar{position:fixed; top:0; left:0; right:0; z-index:50; background:#1f2937; color:#fff; display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:8px 12px; padding-top:calc(8px + env(safe-area-inset-top)); font-size:.78rem}
  #demobar .desc{white-space:nowrap}
  #demobar .tag{background:var(--laranja); color:#fff; border-radius:6px; padding:2px 8px; font-weight:700; letter-spacing:.5px}
  #demobar .roles{margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end}
  #demobar .roles button{background:#374151; color:#d1d5db; padding:6px 10px; border-radius:8px; font-size:.78rem; white-space:nowrap}
  #demobar .roles button.on{background:var(--verde); color:#fff; font-weight:700}
  @media (max-width:620px){
    #demobar .desc{display:none}
    #demobar .roles{margin-left:0; width:100%; justify-content:space-between}
    #demobar .roles button{flex:1; padding:10px 2px; text-align:center; font-size:.8rem}
  }

  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--app-bg, var(--branco)); padding:64px 0 calc(90px + env(safe-area-inset-bottom))}
  /* fallback caso o JS de medição não rode; o valor real é aplicado dinamicamente pela altura da barra */
  @media (max-width:620px){ #app{padding-top:calc(112px + env(safe-area-inset-top))} }
  .tela{display:none; padding:0 16px}
  .tela.on{display:block}

  /* cabeçalho de cada perfil */
  .topo{padding:18px 16px 14px; background:var(--verde); color:#fff; margin:0 -16px 16px; border-radius:0 0 18px 18px}
  .topo h1{font-size:1.15rem; font-weight:700}
  .topo p{opacity:.85; font-size:.85rem; margin-top:2px}

  .cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px}
  .card{background:var(--cinza-claro); border-radius:14px; padding:14px}
  button.card{text-align:left; font-family:inherit; cursor:pointer}
  button.card:active{transform:scale(.97)}
  .card .num{font-size:1.45rem; font-weight:800}
  .card .lbl{font-size:.78rem; color:var(--cinza); margin-top:2px}
  .card.alerta{background:var(--vermelho-claro)} .card.alerta .num{color:var(--vermelho)}
  .card.ok{background:var(--ok-claro)} .card.ok .num{color:var(--ok-escuro)}
  .card.aten{background:var(--amarelo-claro)} .card.aten .num{color:var(--laranja)}

  h2{font-size:1rem; margin:18px 0 10px; display:flex; align-items:center; justify-content:space-between}
  h2 .mais{font-size:.85rem; color:var(--verde); font-weight:600; padding:10px; margin:-10px; cursor:pointer}

  .item{background:var(--branco); border:1px solid var(--borda); border-radius:14px; padding:13px 14px; margin-bottom:10px}
  .item .linha1{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .item .nome{font-weight:700; font-size:.95rem}
  .item .sub{font-size:.875rem; color:var(--cinza); margin-top:3px}
  .chip{font-size:.78rem; font-weight:700; padding:4px 10px; border-radius:99px; white-space:nowrap}
  .chip.vermelho{background:var(--vermelho-claro); color:var(--vermelho)}
  .chip.laranja{background:var(--amarelo-claro); color:var(--laranja-txt)}
  .chip.verde{background:var(--ok-claro); color:var(--ok-escuro)}
  .chip.ok{background:var(--ok-claro); color:var(--ok-escuro)}
  .chip.cinza{background:var(--cinza-claro); color:var(--cinza)}
  .chip.acao{background:var(--verde); color:#fff; padding:5px 12px}

  .botoes{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
  .botoes .btn{min-width:130px}
  .btn{flex:1; padding:11px; border-radius:10px; font-weight:700; font-size:.88rem; text-align:center; text-decoration:none; display:block}
  .btn.principal{background:var(--verde); color:#fff}
  .btn.zap{background:#13883e; color:#fff}
  /* ações utilitárias compactas: ícone só, não competem com o primário */
  .btn-ic{flex:0 0 auto; width:46px; height:46px; padding:0; display:flex; align-items:center; justify-content:center; font-size:1.15rem; border-radius:12px}
  .btn-ic.zap{background:#e7f8ef; color:#1c8c4d}
  .btn-ic.doc{background:var(--cinza-claro); color:var(--texto)}
  body.tema-p .btn-ic.zap{background:#143524; color:#3ddc84}
  .btn.claro{background:var(--cinza-claro); color:var(--texto)}
  .btn.perigo{background:var(--vermelho-claro); color:var(--vermelho)}
  /* emergência: contraste máximo em qualquer tema — vermelho sólido + branco */
  .btn.emergencia{background:#c0392b; color:#fff; display:block; text-align:left}
  body.tema-p .btn.emergencia{background:#E5484D}
  .btn:active{opacity:.8}
  /* flex:none impede o botão de esticar verticalmente dentro de colunas flex (bug do botão gigante no login do iPhone) */
  .btn-grande{width:100%; padding:16px; font-size:1.05rem; margin:6px 0; flex:0 0 auto}
  #tela-login .btn, #tela-login input{flex:0 0 auto}

  /* menu inferior */
  /* safe-area: no iPhone (Safari), a barra "home" cobre o menu sem esse respiro */
  #menu{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--branco); border-top:1px solid var(--borda); display:flex; z-index:40; padding-bottom:env(safe-area-inset-bottom)}
  #menu button{flex:1; background:none; padding:10px 4px 14px; font-size:.74rem; color:var(--cinza); display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:0}
  #menu button .ico{font-size:1.35rem}
  #menu button.on{color:var(--verde); font-weight:700}

  /* calendário */
  .cal{border:1px solid var(--borda); border-radius:14px; padding:12px; margin-bottom:14px}
  .cal .mes{text-align:center; font-weight:700; margin-bottom:10px}
  .cal .grade{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center}
  .cal .dsem{font-size:.68rem; color:var(--cinza); font-weight:700; padding:4px 0}
  .cal .dia{padding:13px 0; border-radius:9px; font-size:.95rem; background:var(--cinza-claro)}
  .cal .dia.livre{background:var(--verde-claro); color:var(--verde-escuro); font-weight:600}
  .cal .dia.ocupado{background:var(--vermelho-claro); color:var(--vermelho); font-weight:600; text-decoration:line-through}
  .cal .dia.vazio{background:none}
  .cal .dia.passado{background:none; color:#c4c8cf}
  .legenda{display:flex; gap:14px; font-size:.75rem; color:var(--cinza); margin-bottom:14px}
  .legenda span::before{content:'●'; margin-right:4px}
  .legenda .l1::before{color:#9ce0c8} .legenda .l2::before{color:#f5b7ad}

  .abas{display:flex; gap:8px; margin-bottom:14px}
  .abas button{flex:1; padding:10px; background:var(--cinza-claro); color:var(--cinza); font-weight:700; font-size:.85rem}
  .abas button.on{background:var(--verde); color:#fff}

  select,input,textarea{width:100%; padding:13px; border:1px solid var(--borda); border-radius:10px; font-size:1rem; font-family:inherit; background:var(--branco); color:var(--texto); margin-bottom:10px}
  input::placeholder{color:var(--cinza); opacity:1}
  label{font-size:.8rem; font-weight:700; color:var(--cinza); display:block; margin-bottom:5px}

  /* modal */
  #fundo-modal{display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.45); z-index:60; align-items:flex-end; justify-content:center}
  #fundo-modal.on{display:flex}
  #modal{background:var(--branco); width:100%; max-width:480px; border-radius:20px 20px 0 0; padding:20px 18px calc(28px + env(safe-area-inset-bottom)); max-height:86vh; overflow-y:auto; -webkit-overflow-scrolling:touch}
  #modal h3{font-size:1.05rem; margin-bottom:12px; padding-right:44px}
  #modal .linha1{padding-right:44px} /* libera o canto pro X sticky não cobrir chips */
  .pix-caixa{background:var(--cinza-claro); border-radius:10px; padding:12px; font-family:monospace; font-size:.7rem; word-break:break-all; margin:10px 0; max-height:90px; overflow-y:auto}
  .msg-preview{background:#e7f8ef; border-left:4px solid #25d366; border-radius:8px; padding:12px; font-size:.85rem; white-space:pre-wrap; margin:10px 0}

  /* gráficos do balancete (CSS puro) */
  .graf-meses{display:flex; gap:6px; align-items:flex-end; height:96px; margin:12px 0 4px; border-bottom:1px solid var(--borda); padding-bottom:1px}
  .graf-meses .mes-col{flex:1; display:flex; gap:3px; align-items:flex-end; height:100%}
  .graf-meses .barra{flex:1; border-radius:4px 4px 0 0; min-height:4px}
  .graf-meses .rec{background:var(--verde)}
  .graf-meses .desp{background:#f0a35e}
  .graf-meses .mes-col{cursor:pointer; border-radius:4px}
  .graf-meses .mes-col:active{background:rgba(0,0,0,.05)}
  .legbox{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}
  .legbox.rec{background:var(--verde)} .legbox.desp{background:#f0a35e}
  body.tema-b .graf-meses .rec,body.tema-b .legbox.rec,body.tema-b .cat-barra{background:#5a7d5a}
  body.tema-b .graf-meses .desp,body.tema-b .legbox.desp{background:#c99d54}
  body.tema-b .graf-meses{border-color:#e8dfd0}
  body.tema-b .cat-trilha{background:#efe9dd}
  .graf-rotulos{display:flex; gap:8px; margin-bottom:10px}
  .graf-rotulos span{flex:1; text-align:center; font-size:.7rem; color:var(--cinza)}
  .graf-cat{margin:8px 0}
  .graf-cat .cat-linha{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .graf-cat .cat-nome{flex:0 0 110px; font-size:.78rem}
  .cat-trilha{flex:1; background:var(--cinza-claro); border-radius:99px; height:16px; overflow:hidden}
  .cat-barra{height:100%; background:var(--verde); border-radius:99px}
  .graf-cat .cat-pct{flex:0 0 64px; font-size:.75rem; font-weight:700; text-align:right}

  /* toast */
  #toast{position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:#1f2937; color:#fff; padding:14px 18px; border-radius:12px; font-size:.95rem; z-index:70; display:none; max-width:90%; text-align:center}
  #toast button{background:var(--verde); color:#fff; padding:8px 14px; border-radius:8px; font-size:.9rem; font-weight:700; margin-left:10px}

  /* login */
  #tela-login{display:flex; flex-direction:column; justify-content:center; min-height:80vh; text-align:center}
  #tela-login .logo{font-size:2.2rem; font-weight:800; color:var(--verde); margin-bottom:6px}
  #tela-login .slogan{color:var(--cinza); margin-bottom:34px; font-size:.95rem}
  #tela-login input{text-align:center}
  .aviso-lgpd{font-size:.8rem; color:var(--cinza); margin-top:26px; line-height:1.5}

  /* ===== ${nomeAssist} — assistente do shopping ===== */
  .edi-linha{display:flex; align-items:flex-end; gap:8px; margin:8px 0}
  .edi-av{flex:0 0 32px; width:32px; height:32px; border-radius:50%; background:var(--verde-claro); border:1.5px solid var(--verde); display:flex; align-items:center; justify-content:center; font-size:1.05rem}
  .edi-bolha{display:inline-block; background:var(--cinza-claro); border-radius:14px 14px 14px 4px; padding:10px 14px; font-size:.92rem; max-width:85%}
  .edi-acao .botoes{margin:0; justify-content:flex-start; gap:6px}
  .edi-acao .btn{display:inline-flex; align-items:center; gap:6px; width:auto; flex:0 0 auto; padding:8px 14px; font-size:.85rem; font-weight:700; background:var(--verde-claro)!important; color:var(--verde-escuro)!important; border:1px solid var(--verde); box-shadow:none}
  .edi-card{border:1px solid var(--borda); border-left:4px solid var(--verde); border-radius:0 12px 12px 0; padding:12px 14px; margin-top:8px; background:var(--branco)}
  #edi-fab{position:fixed; z-index:45; bottom:calc(96px + env(safe-area-inset-bottom)); right:14px; width:62px; height:62px; border-radius:50%; background:var(--branco); display:none; align-items:center; justify-content:center; box-shadow:0 5px 18px rgba(0,0,0,.22); line-height:1; padding:0; cursor:pointer}
  #edi-fab .edi-mini{width:46px; height:46px}
  @media (min-width:700px){ #edi-fab{right:calc(50% - 306px)} }

  /* ===== TEMA ÚNICO "Caderno do shopping" =====
     Uma identidade só, para todos os perfis: fundo creme, fichas com lombada,
     títulos serifados. Cor continua sendo estado (verde ok / âmbar atenção /
     vermelho prazo), nunca decoração. */
  body.tema-b #app{background:#faf6ee}
  body.tema-b .topo{background:transparent; color:#3b3127; padding-top:24px}
  body.tema-b .topo h1{font-family:Georgia,'Times New Roman',serif; font-weight:600; font-size:1.3rem}
  body.tema-b .topo p{color:#8a7b66; opacity:1}
  body.tema-b h2{font-family:Georgia,'Times New Roman',serif; font-weight:600}
  body.tema-b .item{background:#fff; border:1px solid #e8dfd0; border-left-width:5px; border-radius:0 12px 12px 0}
  body.tema-b .card{background:#fff; border:1px solid #e8dfd0}
  body.tema-b #menu{background:#fff; border-top-color:#e8dfd0}
  body.tema-b #menu button.on{color:#3d5a3d}
  body.tema-b .btn.principal{background:#5a7d5a}
  body.tema-b .edi-bolha{background:#f4eee2}
  body.tema-b .cal{background:#fff; border-color:#e8dfd0}
  body.tema-b .abas button.on{background:#5a7d5a}
  .arrec-trilha{background:rgba(255,255,255,.25); border-radius:99px; height:7px; margin-top:6px}
  .arrec-barra{background:#34d399; height:7px; border-radius:99px}
  body.tema-b .arrec-trilha{background:#e8dfd0}
  body.tema-b .arrec-barra{background:#5a7d5a}

  /* ===== TEMA "CondoX Premium" (design system CondoX v1: roxo #5B4DFF,
     cantos 16px, sombras suaves — concorre com Nubank/iFood, não com ERP) ===== */
  body.tema-x{--verde:#5B4DFF; --verde-claro:#EEEAFE; --verde-escuro:#3528D9; --laranja:#F59E0B; --vermelho:#EF4444; --cinza:#5C6175; --cinza-claro:#F4F4FA; --borda:#E7E8F0; --texto:#121426}
  body.tema-x #app{background:#F7F7FB}
  body.tema-x .topo{background:#5B4DFF; border-radius:0 0 24px 24px}
  body.tema-x .item{border-radius:16px; border-color:#E7E8F0; box-shadow:0 8px 24px rgba(20,24,48,.06)}
  body.tema-x .card{border-radius:16px; background:#fff; box-shadow:0 8px 24px rgba(20,24,48,.06)}
  body.tema-x .btn,body.tema-x select,body.tema-x input{border-radius:16px}
  body.tema-x #menu button.on{color:#5B4DFF}
  body.tema-x #edi-fab{box-shadow:0 12px 32px rgba(91,77,255,.35)}
  body.tema-x .arrec-barra{background:#22C55E}
  body.tema-x .cal{border-radius:16px}

  /* ===== TEMA "Giro Premium" — dark luxury (Premium Design System v2) =====
     Dark mode padrão (#050816), roxo royal, dourado só em selo premium,
     vidro no modal. "Nunca parecer sistema de administração de shopping." */
  body.tema-p{--verde:#5B4DFF; --verde-claro:#221d4d; --verde-escuro:#C9C2FF;
    --laranja:#FBBF24; --vermelho:#F87171; --vermelho-claro:#3a1320; --amarelo-claro:#3a2a10;
    --cinza:#9AA1B8; --cinza-claro:#101B33; --borda:#232C47; --texto:#F5F6FA; --branco:#0B1430;
    background:#050816}
  body.tema-p #app{background:#050816}
  /* topo = gradiente Luxury (#081126→#050816) do DS: o chrome é discreto;
     o violeta signature fica só no hero, que é o ponto focal */
  body.tema-p .topo{background:linear-gradient(180deg,#081126 0%,#050816 100%); border-radius:0}
  body.tema-p #demobar{background:#081126}
  body.tema-p .hero{background:linear-gradient(135deg,#5B4DFF,#8B5CFF); border:1px solid rgba(216,179,106,.45); box-shadow:0 24px 64px rgba(91,77,255,.25); border-radius:22px}
  body.tema-p .item,body.tema-p .card,body.tema-p .acesso button{border-radius:16px}
  body.tema-p #menu{background:#0B1430; border-top-color:#232C47}
  body.tema-p #menu button.on{color:#A99DFF}
  body.tema-p #edi-fab{box-shadow:0 12px 32px rgba(91,77,255,.30)}
  body.tema-p #modal{background:rgba(16,27,51,.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px)}
  body.tema-p #modal .fechar-x{background:#1b2440; color:#F5F6FA}
  body.tema-p .msg-preview{background:#10231c; border-color:#25d366; color:#d9f5e7}
  body.tema-p .edi-cta{background:rgba(8,17,38,.55); color:#D7DBE7}
  body.tema-p .edi-cta .icn{color:#C9C2FF}
  body.tema-p .cal .dia{background:#101B33}
  body.tema-p .cal .dia.passado{background:none; color:#3c4666}
  body.tema-p .arrec-trilha{background:#232C47}
  body.tema-p .legbox.desp{background:#D8B36A}
  body.tema-p .graf-meses .desp{background:#D8B36A}
  body.tema-p .step{background:#1b2440; color:#F5F6FA}
  /* "concluído/bloqueado" sem matar a legibilidade: nada de opacity no card inteiro */
  .item.feito{opacity:.72}
  body.tema-p .item.feito{opacity:1; background:#070d20}
  body.tema-p .item.feito .nome{color:#9AA1B8}
  body.tema-p .chip.cinza{background:#1b2440; color:#C2C8DA}
  body.tema-p .btn.claro{background:#1b2440}
  /* white-label: cor personalizada (corCustom) vence os hardcodes de tema nos elementos de marca */
  body.wl-custom .btn.principal{background:var(--verde)}
  body.wl-custom .cat-barra,body.wl-custom .legbox.rec,body.wl-custom .graf-meses .rec{background:var(--verde)}
  /* acessibilidade no dark: tons claros do roxo para texto/ícone pequenos
     (roxo #5B4DFF puro não passa de 4.5:1 sobre o fundo escuro) */
  body.tema-p h2 .mais{color:#A99DFF}
  body.tema-p .acesso .ic{color:#A99DFF}
  body.tema-p #toast{background:#101B33; border:1px solid #2e3a5c}
  body.tema-p button:focus-visible,body.tema-p a:focus-visible,body.tema-p input:focus-visible,body.tema-p select:focus-visible{outline-color:#A99DFF}
  /* logo: versão clara no dark, sem cartão de fundo.
     o display mora AQUI — se ficar no style inline da img, ganha da classe */
  .logo-claro{display:block}
  .logo-escuro{display:none}
  body.tema-p .logo-claro{display:none}
  body.tema-p .logo-escuro{display:block}
  /* ===== logo Giro (SVG inline — acompanha a cor de destaque) ===== */
  .viva-logo{display:flex; align-items:center; gap:10px; justify-content:center}
  .viva-logo .vl-mark{width:48px; height:48px; flex:0 0 auto}
  .viva-logo .vl-word{font-size:2rem; font-weight:800; letter-spacing:-.02em; color:var(--verde); line-height:1}
  .viva-logo .vl-word b{color:var(--gold); font-weight:800}
  body.tema-p .viva-logo .vl-word{color:#fff}
  .viva-logo.vl-dark .vl-word{color:#fff}
  .viva-logo.big{margin:2px auto 6px}
  .viva-logo.big .vl-mark{width:62px; height:62px}
  .viva-logo.big .vl-word{font-size:2.7rem}
  /* white-label */
  .wl-card{border:1px solid var(--borda); border-radius:14px; padding:16px; background:var(--branco); text-align:center}
  body.tema-p .wl-card{background:#101b33; border-color:#26345c}
  .wl-swatch{width:28px; height:28px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.18); cursor:pointer; padding:0}
  .wl-swatch.on{outline:3px solid var(--verde); outline-offset:1px}
  .wl-color{width:42px; height:30px; border:1px solid var(--borda); border-radius:8px; padding:0; background:none; cursor:pointer}
  /* barra de contexto da administradora dentro de um shopping */
  .adm-ctx{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; background:var(--verde-escuro); color:#fff; border-radius:12px; padding:8px 12px; margin-bottom:12px; font-size:.85rem}
  .adm-ctx b{color:#fff}
  .adm-ctx .acts{display:flex; gap:6px}
  .adm-ctx .acts button{background:rgba(255,255,255,.18); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-weight:700; font-size:.8rem; cursor:pointer}
  .adm-ctx .acts button:hover{background:rgba(255,255,255,.3)}

  /* ícones personalizados (SVG inline, herdam a cor do texto) */
  .icn{width:1em; height:1em; display:block; margin:0 auto}
  #menu .ico .icn{width:22px; height:22px}
  /* ícone em título de tela e em marcador de tipo (no lugar de emoji:
     render idêntico em qualquer aparelho e cor que segue o tema) */
  .t-ico{display:inline-flex; vertical-align:-3px; margin-right:7px}
  .icn-in{width:14px; height:14px; vertical-align:-2px; margin-right:4px}
  .t-ico .icn{width:21px; height:21px}
  .ico-in{display:inline-flex; vertical-align:-2.5px; margin-right:4px}
  .ico-in .icn{width:16px; height:16px}
  /* menu ativo "filled": pílula atrás do ícone + traço mais forte (padrão iOS) */
  #menu button.on .ico{background:var(--verde-claro); border-radius:99px; padding:4px 16px; animation:pop .22s ease-out}
  #menu button.on .icn{stroke-width:2.3}
  body.tema-p #menu button.on .ico{background:#221d4d}
  /* micro-interações (Premium DS: "todos os elementos respondem ao toque") */
  @keyframes pop{from{transform:scale(.8)}to{transform:scale(1)}}
  @keyframes subir{from{transform:translate(-50%,10px); opacity:0}to{transform:translate(-50%,0); opacity:1}}
  #toast{animation:subir .25s ease-out}
  .btn:active,.acesso button:active,.step:active{transform:scale(.97)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  #edi-fab .icn{width:26px; height:26px}
  .edi-av{color:var(--verde-escuro)}
  .edi-av .icn{width:18px; height:18px}
  /* ===== EXPERIMENTO Giro 3.0: barra de comando + feed (rollback: v2.38) ===== */
  .comando{display:flex; align-items:center; gap:8px; background:var(--branco); border:1.5px solid var(--verde); border-radius:99px; padding:4px 4px 4px 16px; margin-bottom:4px}
  .comando input{flex:1; width:auto; border:none; outline:none; background:none; font-size:.95rem; font-family:inherit; color:var(--texto); padding:11px 0; margin:0; border-radius:0}
  .comando .mic{width:54px; height:54px; border-radius:50%; background:var(--verde); color:#fff; flex:0 0 auto; display:flex; align-items:center; justify-content:center}
  .comando .mic .icn{width:21px; height:21px}
  .edi-mini{position:relative; display:inline-block; width:34px; height:34px; --e-acc:#0E7490; --e-light:#1596AE; --e-eye:#7FE0EC; --e-f1:#0A4E5C; --e-f2:#063842}
  .comando .mic .edi-mini{width:46px; height:46px}
  .edi-av .edi-mini{width:28px; height:28px}
  .topo .edi-av .edi-mini{width:40px; height:40px}
  .edi-mini>*{position:absolute}
  .em-halo{inset:-12%; border-radius:50%; background:radial-gradient(circle, rgba(14,116,144,.34) 0%, transparent 66%); filter:blur(1px); animation:emGlow 3.5s ease-in-out infinite}
  .em-ring{inset:-3%; border-radius:50%; border:1.5px dashed rgba(14,116,144,.5); opacity:.55; animation:emSpin 14s linear infinite}
  .em-body{inset:6%; border-radius:50%; overflow:hidden; background:linear-gradient(160deg,var(--e-light) 0%,var(--e-acc) 100%); box-shadow:0 3px 7px rgba(14,116,144,.34), inset 0 2px 4px rgba(255,255,255,.33); animation:emFloat 4s ease-in-out infinite}
  .em-face{position:absolute; left:15%; right:15%; top:21%; bottom:21%; border-radius:42%; background:linear-gradient(180deg,var(--e-f1),var(--e-f2)); box-shadow:inset 0 1px 3px rgba(0,0,0,.4); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8%}
  .em-eyes{display:flex; width:58%; justify-content:space-between; align-items:center}
  .em-eye{width:26%; aspect-ratio:1/1.15; border-radius:50%; background:var(--e-eye); box-shadow:0 0 4px var(--e-eye); transform-origin:center; animation:emBlink 4.2s infinite}
  .em-mouth{width:32%; height:16%; border:2px solid var(--e-eye); border-top:none; border-radius:0 0 60% 60%; transform-origin:center}
  .em-cheek{position:absolute; top:55%; width:13%; aspect-ratio:1; border-radius:50%; background:#FF6B4A; opacity:.5; filter:blur(1.5px)}
  .em-cheek.l{left:17%} .em-cheek.r{right:17%}
  .em-ant{position:absolute; left:50%; top:1.5%; transform:translateX(-50%); width:9%; aspect-ratio:1; border-radius:50%; background:var(--e-eye); box-shadow:0 0 5px var(--e-eye)}
  .em-think{position:absolute; top:5%; display:flex; gap:16%; width:42%; justify-content:center; opacity:0}
  .em-think i{width:16%; aspect-ratio:1; border-radius:50%; background:var(--e-eye); animation:emThink 1.4s ease-in-out infinite}
  .em-think i:nth-child(2){animation-delay:.2s} .em-think i:nth-child(3){animation-delay:.4s}
  html[data-edi="thinking"] .em-mouth{width:16%; height:8%; border:none; border-radius:20px; background:var(--e-eye); opacity:.7}
  html[data-edi="thinking"] .em-think{opacity:1}
  html[data-edi="talking"] .em-mouth{width:34%; height:30%; border:none; border-radius:42%; background:var(--e-eye); box-shadow:0 0 5px var(--e-eye); animation:emTalk .32s ease-in-out infinite}
  @keyframes emFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  @keyframes emGlow{0%,100%{opacity:.55; transform:scale(1)}50%{opacity:.9; transform:scale(1.05)}}
  @keyframes emBlink{0%,92%,100%{transform:scaleY(1)}94%,97%{transform:scaleY(.1)}}
  @keyframes emSpin{to{transform:rotate(360deg)}}
  @keyframes emThink{0%{transform:translateY(0); opacity:.25}40%{transform:translateY(-3px); opacity:1}80%,100%{transform:translateY(-5px); opacity:0}}
  @keyframes emTalk{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}
  @media (prefers-reduced-motion:reduce){.edi-mini *{animation:none!important}}
  /* botões de ícone do chat do ${nomeAssist} e da triagem herdam tamanho do set */
  #rg-in ~ .btn .icn, .tela .btn .icn{width:20px; height:20px}
  .secao{font-size:.72rem; font-weight:800; letter-spacing:.6px; color:var(--cinza); margin:18px 4px 8px}

  /* ===== Home CondoX: hero + acesso rápido (DS seção 15) ===== */
  .hero{background:var(--verde); border-radius:18px; padding:18px 16px; color:#fff; margin-bottom:14px}
  .hero .h-nome{font-size:1.15rem; font-weight:800}
  .hero .h-sub{font-size:.85rem; opacity:.92; margin-top:3px}

function copiar(texto, okMsg){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(texto).then(()=>toast(okMsg)).catch(()=>copiarFallback(texto, okMsg));
  } else copiarFallback(texto, okMsg);
}
function copiarFallback(texto, okMsg){
  const ta=document.createElement('textarea');
  ta.value=texto; ta.setAttribute('readonly','');
  ta.style.position='fixed'; ta.style.opacity='0'; ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select(); ta.setSelectionRange(0, texto.length);
  let ok=false;
  try{ ok=document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  toast(ok?okMsg:'Não consegui copiar automaticamente — toque e segure o texto para copiar.');

function crc16(s){
  let crc=0xFFFF;
  for(let i=0;i<s.length;i++){
    crc^=s.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc=(crc&0x8000)?((crc<<1)^0x1021)&0xFFFF:(crc<<1)&0xFFFF;
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}

function gerarPix(chave,nome,cidade,valor,txid){

        + campo('60', mai(cidade).slice(0,15))
        + campo('62', campo('05', txid.slice(0,25)))
        + '6304';
  return p + crc16(p);
}

/* helpers de cor: derivam tons da cor de destaque escolhida */
function _hx(h){h=(h||'').replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return [0,2,4].map(i=>parseInt(h.slice(i,i+2),16));}
function _to(r,g,b){return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function corShade(hex,amt){const [r,g,b]=_hx(hex);const f=1+amt;return _to(r*f,g*f,b*f);}
function corMix(hex,hex2,t){const a=_hx(hex),b=_hx(hex2);return _to(a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t);}
/* luminância relativa e contraste (WCAG) — pra checar legibilidade do texto sobre a cor de marca */
function _lum(hex){const v=_hx(hex).map(c=>{c/=255;return c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);});return .2126*v[0]+.7152*v[1]+.0722*v[2];}
function contraste(h1,h2){const a=_lum(h1),b=_lum(h2),hi=Math.max(a,b),lo=Math.min(a,b);return (hi+.05)/(lo+.05);}
function ehHex(s){return /^#?[0-9a-fA-F]{6}$/.test((s||'').trim());}
function normHex(s){s=(s||'').trim();return s[0]==='#'?s:'#'+s;}

function aplicarTema(){
  /* tema personalizado = qualquer uma das 3 cores definida (fundo/destaque/detalhe).
     Quando há custom, saímos dos presets e montamos sobre a base limpa, pra não brigar
     com os hardcodes de cada tema. */
  const isCustom = !!(corBg||corCustom||corGold);
  document.body.classList.remove('tema-b','tema-x','tema-p');
  if(!isCustom){ const c=TEMAS[temaAtual].cls; if(c) document.body.classList.add(c); }
  const root=document.documentElement.style;
  ['--verde','--verde-escuro','--verde-claro','--app-bg','--branco','--texto','--borda','--cinza','--cinza-claro'].forEach(p=>root.removeProperty(p));
  /* 2) destaque */
  if(corCustom){
    root.setProperty('--verde', corCustom);
    root.setProperty('--verde-escuro', corShade(corCustom,-0.22));
    root.setProperty('--verde-claro', corMix(corCustom,'#ffffff',0.86));
  }
  /* 3) detalhe — segue o tema escolhido quando não há override */
  root.setProperty('--gold', corGold || (isCustom?'#eab14a':(TEMAS[temaAtual].cores[2]||'#eab14a')));
  /* 1) fundo — com adaptação automática de superfícies/texto quando é escuro */
  if(corBg){
    root.setProperty('--app-bg', corBg);
    if(_lum(corBg) < 0.42){
      root.setProperty('--branco', corMix(corBg,'#ffffff',0.10));
      root.setProperty('--texto', '#eef2f7');
      root.setProperty('--borda', corMix(corBg,'#ffffff',0.22));
      root.setProperty('--cinza', '#aeb8c6');
      root.setProperty('--cinza-claro', corMix(corBg,'#ffffff',0.07));
    }
  }
  document.body.classList.toggle('wl-custom', !!corCustom);
}

   - 6+ pisos     -> botão único "Piso: x ▾" que abre um picker (com busca acima de 10) */

  const opts=['Todas',...PISOS];
  if(PISOS.length<=5){

function refreshNav(){

  m.innerHTML = itens.map(([id,icn,lbl])=>`<button id="mb-${id}" onclick="irPara('${id}')"><span class="ico">${ico(icn)}</span>${lbl}</button>`).join('');

function irPara(tela){
  telaAtual=tela;
  /* ${nomeAssist} unificado: botão flutuante em TODOS os perfis, sempre no mesmo canto —
     padrão único (some só dentro da própria conversa) */
  /* FAB removido: o ${nomeAssist} tem duas âncoras — a barra de busca no topo da home e a aba "${nomeAssist}" na barra inferior. Um botão flutuante a mais só tapava conteúdo. */
  const fab=$('#edi-fab'); if(fab) fab.style.display='none';
  document.querySelectorAll('#menu button').forEach(b=>b.classList.remove('on'));
  const mb=$('#mb-'+tela); if(mb) mb.classList.add('on');
  $('#app').innerHTML = TELAS[tela]();
  /* quadro de manutenção: só ele alarga o app no PC — sai da classe ao trocar de tela */
  document.body.classList.toggle('vista-quadro', tela==='manutencao' && vistaManut==='quadro');
  /* ${nomeAssist} fora da home: a home traz a barra "Peça ao ${nomeAssist}" no corpo (ali a intenção
     é "o que eu faço?"). Nas telas de tarefa/lista o topo é do conteúdo — o assistente vira um
     BOTÃO FLUTUANTE (não ocupa espaço) que abre o chat do ${nomeAssist}. */
  if(perfil==='sindico' && modOn('edi') && !admContexto && tela!=='fontesEdi' && tela!=='mregras' && !$('#app').querySelector('.comando')){
    const fab=$('#edi-fab'); if(fab) fab.style.display='flex';
  }
  /* barra de contexto quando a administradora está gerindo um shopping da carteira */
  if(perfil==='sindico' && admContexto){
    const wrap=document.createElement('div'); wrap.innerHTML=bannerAdmContexto();
    const el=wrap.firstElementChild; if(el) $('#app').insertBefore(el, $('#app').firstChild);
  }
}

function obAnexar(k){
  if(k==='atas'){ obDocs.atas++; toast(`Ata anexada (${obDocs.atas}) — o ${nomeAssist} já considera as decisões dela`); }
  else { obDocs[k]=true; toast(`${k==='convencao'?'Contrato de locação':'Regimento'} anexado — ${nomeAssist} treinado com este documento`); }
  renderOnboarding();
}
function obConcluir(){
  /* reflete no estado real do ${nomeAssist} o que foi anexado no onboarding */
  if(typeof ediFontes!=='undefined'){
    const set=(k,on)=>{const f=ediFontes.find(x=>x.k===k); if(f) f.status=on?'treinado':'pendente';};
    set('convencao', obDocs.convencao); set('regimento', obDocs.regimento); set('atas', obDocs.atas>0);
  }
  if(obOrigem==='administradora'){
    if(obEditIx===-1 && obNovo){
      carteira.push({nome:obNovo.nome, cidade:obNovo.cidade, un:obNovo.un||0, inadPct:0, inad:0, ocor:0, manut:0, caixa:0, edi:0, sindico:'a definir', status:'ok', novo:true});
      toast(`Shopping "${obNovo.nome}" adicionado à carteira e configurado`);
    } else if(obEditIx!=null && carteira[obEditIx]){
      if(obCond.lojas) carteira[obEditIx].un=obCond.lojas;
      toast(`Configurações de "${carteira[obEditIx].nome}" atualizadas`);
    }
    obOrigem='sindico'; obEditIx=null; obNovo=null;
    trocarPerfil('administradora'); irPara('carteira'); return;
  }
  toast('Tudo pronto, superintendente! Bem-vindo ao seu painel'); trocarPerfil('sindico');
}

  const naPiso=inadimplentes.filter(i=>passaPiso(daPiso(i.un)));
  const FAIXAS=['Todas','1–30','31–60','61–90','90+'];
  if(inadFaixa!=='Todas'&&!naPiso.some(i=>faixaKey(i.dias)===inadFaixa)) inadFaixa='Todas';
  const contaFx=k=>k==='Todas'?naPiso.length:naPiso.filter(i=>faixaKey(i.dias)===k).length;
  const faixaRow=`<div style="font-size:.72rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--cinza); margin:0 0 5px">Atraso</div>
  <div style="display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:12px">
    ${FAIXAS.map(k=>`<button class="chip ${inadFaixa===k?'verde':'cinza'}" style="border:none; flex:0 0 auto; white-space:nowrap" onclick="inadFaixa='${k}';atualizar()">${k}${k!=='Todas'?` (${contaFx(k)})`:''}</button>`).join('')}

  ${filtroPisoHtml()}
  ${faixaRow}

    <div class="sub">${i.meses.length} competência(s) · saldo <b>${fmt(divida(i))}</b>${i.alugada?` · ${tIco('casa')}alugada`:''}</div>

</div>`;
};
/* detalhe da cobrança: competências, situação da loja e ações */
function verCobranca(ix){
  const i=inadimplentes[ix]; if(!i) return;
  const [f,c]=faixa(i.dias);
  abrirModal(`<h3>${i.un} — ${i.resp}</h3>
    <div class="sub" style="margin-bottom:8px"><span class="chip ${c}">${f}</span> · ${i.dias} dias de atraso</div>
    <div class="sub" style="margin-bottom:6px"><b>Competências em aberto:</b> ${i.meses.join(', ')}</div>
    <div class="sub" style="margin-bottom:6px"><b>Saldo com encargos:</b> ${fmt(divida(i))}</div>
    ${i.alugada?'<div class="sub" style="margin-bottom:6px">Loja sublocada — a cobrança vai ao <b>titular do contrato</b>, não ao operador (a responsabilidade é de quem assina a locação com o empreendedor — Lei 8.245/91).</div>':''}
    ${i.tel?'':'<div class="sub" style="margin-bottom:6px">Sem WhatsApp cadastrado — use "copiar mensagem".</div>'}
    <div class="botoes" style="margin-top:12px">
      <button class="btn zap" onclick="cobrar(${ix})">Cobrar no WhatsApp</button>
      <button class="btn claro" onclick="baixa(${ix})">Registrar pagamento</button>
    </div>`);
}

function cobrar(ix){
  const i=inadimplentes[ix], valor=divida(i);
  const txid=(i.un.replace(/\D/g,'')||'000')+'-2026-06';
  const pix=gerarPix(COND.chavePix, COND.nome, COND.cidade, valor, 'APTO'+txid);
  const msg=`Olá, ${i.resp.split(' ')[0]}! Aqui é da administração do ${COND.nome}. Consta em aberto a taxa do ${i.un} (${i.meses.join(', ')}), total de ${fmt(valor)} com encargos. Você pode pagar agora pelo PIX copia e cola abaixo. Qualquer dúvida, estou à disposição!\n\n${pix}`;
  window._msgCobranca = msg;
  abrirModal(`<h3>Cobrança — ${i.un}</h3>
    <div class="msg-preview">${msg.split('\n\n')[0]}\n\n[PIX copia e cola]</div>
    <label>PIX copia e cola (${fmt(valor)})</label>
    <div class="pix-caixa">${pix}</div>
    <div class="botoes">
      <button class="btn claro" onclick="copiar('${pix}','PIX copiado')">Copiar PIX</button>
      ${i.tel?`<a class="btn zap" target="_blank" href="https://wa.me/${i.tel}?text=${encodeURIComponent(msg)}">Abrir WhatsApp</a>`
             :`<button class="btn claro" onclick="copiar(window._msgCobranca,'Mensagem copiada — sem WhatsApp cadastrado')">Copiar mensagem</button>`}
    </div>
    <div class="aviso-lgpd">Você envia pelo seu WhatsApp — a mensagem já vai pronta. Nada é disparado automaticamente.</div>`);
}
function baixa(ix){
  const i=inadimplentes[ix];
  abrirModal(`<h3>Registrar pagamento — ${i.un}</h3>
    <label>Valor recebido</label><input id="vlr" type="text" value="${divida(i).toFixed(2).replace('.',',')}">
    <div class="aviso-lgpd" style="margin:0 0 12px">Pagamento parcial? Sem problema: o saldo devedor é recalculado.</div>
    <button class="btn principal btn-grande" onclick="confirmaBaixa(${ix})">Confirmar recebimento</button>`);
}
function confirmaBaixa(ix){
  const removido=inadimplentes[ix], pos=ix;
  inadimplentes.splice(ix,1);
  fecharModal(); atualizar();
  /* ação irreversível ganha "Desfazer": quem tem 60 anos (ou 16) erra o toque e não pode ficar travado */
  toastAcao(`Pagamento do ${removido.un} registrado `,'Desfazer',()=>{ inadimplentes.splice(pos,0,removido); atualizar(); toast('Baixa desfeita — a loja voltou pra lista.'); });
}

let abaManuSind='contratuais';
let vistaManut='lista'; /* 'lista' | 'quadro' (kanban por situação; largura total no PC) */
let filtroManuStatus='Todas'; /* deep-link/filtro de situação: 'Todas'|'Vencidas'|'Vencendo'|'A conferir'|'Em dia' */
TELAS.manutencao = () => {
  const ordem={vencida:0, aprovacao:1, breve:2, ok:3};
  /* lista enxuta: item + chip + 1 linha; ações moram no detalhe (toque) */
  const linha=(m,ix)=>{
    const chip = chipManu(m);
    const dd = proxManu(m);
    let info;
    if(dd){ const str=dd.toLocaleDateString('pt-BR'); const venceu=dd<hoje;
      info = venceu ? `<b style="color:var(--vermelho)">venceu em ${str}</b>`
           : (m.status==='breve' ? `<b style="color:var(--laranja)">vence em ${str}</b>` : `vence em ${str}`);
    } else info = `última: ${m.ultima}`;
    return `<button class="item" style="width:100%; text-align:left; display:block${m.status==='aprovacao'?'; border-color:var(--laranja)':''}" onclick="verManutencao(${ix})">
      <div class="linha1"><span class="nome">${nomeManu(m)}</span><span style="display:flex; align-items:center; gap:6px; flex:0 0 auto"><span class="chip ${chip[1]}">${chip[0]}</span><span style="color:var(--cinza)">›</span></span></div>
      <div class="sub" style="display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-top:3px"><span class="chip cinza" style="border:none; padding:2px 9px; font-size:.7rem; font-weight:700">${escopoManu(m)}</span><span>${m.per} · ${info}</span></div>
    </button>`;};
  /* resumo de compliance (sobre tudo do piso filtrada) — vira o filtro de Situação */
  const todos=manutencoes.map((m,ix)=>({m,ix})).filter(x=>passaPiso(x.m.piso)).filter(x=>modOn('elevadores')||!/elevador/i.test(x.m.item));
  const cnt=s=>todos.filter(x=>x.m.status===s).length;
  const nVenc=cnt('vencida'), nAprov=cnt('aprovacao'), nBreve=cnt('breve'), nOk=cnt('ok');
  const stMap={'Vencidas':'vencida','Vencendo':'breve','A conferir':'aprovacao','Em dia':'ok'};
  if(filtroManuStatus!=='Todas' && !cnt(stMap[filtroManuStatus])) filtroManuStatus='Todas'; /* nada nessa situação no piso atual */
  const idx=todos.filter(x=> filtroManuStatus==='Todas' || x.m.status===stMap[filtroManuStatus]);
  const contratuais=idx.filter(x=>x.m.empresa), internas=idx.filter(x=>!x.m.empresa);
  const pend=contratuais.filter(x=>x.m.status==='aprovacao').length;
  const lista=(abaManuSind==='contratuais'?contratuais:internas).slice().sort((a,b)=>(ordem[a.m.status]??9)-(ordem[b.m.status]??9));
  const stCnt={'Vencidas':nVenc,'Vencendo':nBreve,'A conferir':nAprov,'Em dia':nOk};
  /* mesmo modelo de chip do filtro "Tipo" das Ocorrências: contornado inativo, verde ativo, "Rótulo (N)" */
  const chipSt=lbl=>{const on=filtroManuStatus===lbl;
    return `<button class="chip ${on?'verde':'cinza'}" style="border:${on?'1px solid var(--verde)':'1px solid var(--borda)'}; background:${on?'var(--verde-claro)':'transparent'}" aria-pressed="${on}" onclick="filtroManuStatus=${on?"'Todas'":JSON.stringify(lbl)};atualizar()">${lbl} (${stCnt[lbl]})</button>`;};
  const resumo=`<div style="display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin:-2px 0 12px">
    <span style="font-size:.74rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--cinza); margin-right:2px">Situação</span>
    ${['Vencidas','Vencendo','A conferir','Em dia'].filter(k=>stCnt[k]>0).map(k=>chipSt(k)).join('')}
    ${filtroManuStatus!=='Todas'?`<button class="chip cinza" style="border:none" onclick="filtroManuStatus='Todas';atualizar()">✕ limpar</button>`:''}
  </div>`;
  /* ---- Quadro (kanban): colunas = situação legal; ignora o filtro de situação (as colunas SÃO o filtro) ---- */
  const todosAba=todos.filter(x=> abaManuSind==='contratuais' ? x.m.empresa : !x.m.empresa);
  const cardQ=(m,ix)=>{
    const dd=proxManu(m); let info;
    if(dd){ const str=dd.toLocaleDateString('pt-BR'); const venceu=dd<hoje;
      info = venceu ? `<b style="color:var(--vermelho)">venceu ${str}</b>`
           : (m.status==='breve' ? `<b style="color:var(--laranja)">vence ${str}</b>` : `vence ${str}`);
    } else info=`última: ${m.ultima}`;
    return `<button class="item mcard" style="width:100%; text-align:left; display:block${m.status==='aprovacao'?'; border-color:var(--laranja)':''}" onclick="verManutencao(${ix})">
      <div class="nome" style="font-size:.88rem; line-height:1.25">${nomeManu(m)}</div>
      <div class="sub" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:6px"><span class="chip cinza" style="border:none; padding:2px 8px; font-size:.68rem; font-weight:700">${escopoManu(m)}</span><span style="font-size:.72rem">${m.per}</span></div>
      <div class="sub" style="margin-top:4px; font-size:.73rem">${info}</div>
    </button>`;};
  const cols=[['Vencidas','vencida','vermelho'],['A conferir','aprovacao','laranja'],['Vencendo','breve','laranja'],['Em dia','ok','ok']];
  const quadro=`<div class="mboard">${cols.map(([lbl,st,cor])=>{
    const its=todosAba.filter(x=>x.m.status===st);
    return `<div class="mcol"><div class="mcol-h"><span class="mdot ${cor}"></span>${lbl}<span class="mcount">${its.length}</span></div>
      <div class="mcol-b">${its.length?its.map(x=>cardQ(x.m,x.ix)).join(''):'<div class="mvazio">nada aqui</div>'}</div></div>`;
  }).join('')}</div>
  <div class="sub" style="margin:10px 0 2px">As colunas são a <b>situação legal</b> de cada item. Toque num card para ver o prazo, o laudo e agir — as mudanças de status (aprovar laudo, registrar execução) acontecem no detalhe.</div>`;
  const toggle=`<div class="vswitch" role="tablist" aria-label="Modo de visualização">
    <button role="tab" aria-selected="${vistaManut==='lista'}" class="${vistaManut==='lista'?'on':''}" onclick="setVistaManut('lista')">☰ Lista</button>
    <button role="tab" aria-selected="${vistaManut==='quadro'}" class="${vistaManut==='quadro'?'on':''}" onclick="setVistaManut('quadro')">▦ Quadro</button>
  </div>`;
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("chave")}Manutenção preventiva</h1><p>Prazos legais do shopping sob controle</p></div>
  ${filtroPisoHtml()}
  <div class="abas">
    <button class="${abaManuSind==='contratuais'?'on':''}" onclick="abaManuSind='contratuais';atualizar()">Contratuais (${contratuais.length})${pend?` · ${pend} p/ aprovar`:''}</button>
    <button class="${abaManuSind==='internas'?'on':''}" onclick="abaManuSind='internas';atualizar()">Internas (${internas.length})</button>
  </div>
  <div class="sub" style="margin:-4px 0 12px">${abaManuSind==='contratuais'
    ?'Itens de empresa certificada: o facilities arquiva o laudo e <b>você</b> aprova a conclusão — é onde sua ação é necessária.'
    :'Verificações internas do facilities — aqui é só para sua ciência: ele executa e registra direto, sem aprovação.'}</div>
  ${toggle}
  ${vistaManut==='quadro' ? quadro : `${resumo}

/* próximo vencimento = última execução + periodicidade (null quando varia por município) — retorna Date */
function proxManu(m){
  const mm={Mensal:1,Trimestral:3,Semestral:6,Anual:12};
  let add=null; for(const k in mm){ if((m.per||'').startsWith(k)){ add=mm[k]; break; } }
  if(add===null) return null;
  const p=(m.ultima||'').split('/'); if(p.length!==3) return null;
  return new Date(+p[2], (+p[1]-1)+add, +p[0]);
}

/* linha do prazo legal: o dado mais importante da tela — quando vence e quanto falta/atrasou */
function prazoManu(m){
  const dd=proxManu(m);
  if(!dd) return `<b>Prazo:</b> conforme exigência do município (periodicidade variável)`;
  const str=dd.toLocaleDateString('pt-BR');
  const dias=Math.round((dd - hoje)/86400000);
  if(dias<0)  return `<b style="color:var(--vermelho)">Venceu em ${str}</b> · ${-dias} dia${-dias>1?'s':''} em atraso`;
  if(dias<=30) return `<b style="color:var(--laranja)">Vence em ${str}</b> · ${dias===0?'vence hoje':'faltam '+dias+' dia'+(dias>1?'s':'')}`;
  return `<b>Próximo vencimento:</b> ${str} · em ${dias} dias`;
}

  }
}

/* ===== RESERVAS (superintendente vê agenda; lojista reserva) ===== */
function calendario(area, clicavel){
  const chave=`${calAno}-${calMes}`;
  if(!reservas[area][chave]) reservas[area][chave]={};
  const ocup = reservas[area][chave];
  const totalDias=new Date(calAno, calMes, 0).getDate();
  const desloca=new Date(calAno, calMes-1, 1).getDay();
  let dias='';
  for(let v=0;v<desloca;v++) dias+='<div class="dia vazio"></div>';
  for(let d=1;d<=totalDias;d++){
    if(calMes===6 && d<10){ dias+=`<div class="dia passado">${d}</div>`; continue; }
    const r=ocup[d];
    /* lojista não vê QUEM reservou (LGPD) — só que está ocupado; o superintendente vê a loja na agenda dele */
    dias += r
      ? (clicavel
          ? `<div class="dia ocupado" onclick="ocupadoFila('${area}',${d})">${d}</div>`
          : `<div class="dia ocupado" onclick="toast('Indisponível: já reservado pelo ${r}')">${d}</div>`)
      : `<div class="dia livre" ${clicavel?`onclick="pedirReserva('${area}',${d})"`:''}>${d}</div>`;
  }
  return `<div class="cal">
    <div class="mes" style="display:flex; align-items:center; justify-content:space-between">
      <button class="chip ${calMes>6?'verde':'cinza'}" style="border:none" onclick="mudarMes(-1)" aria-label="Mês anterior">‹ ant.</button>
      <span>${MES_NOME[calMes]} de ${calAno} — ${area}</span>
      <button class="chip ${calMes<9?'verde':'cinza'}" style="border:none" onclick="mudarMes(1)" aria-label="Próximo mês">próx. ›</button>
    </div>
    <div class="grade"><div class="dsem">D</div><div class="dsem">S</div><div class="dsem">T</div><div class="dsem">Q</div><div class="dsem">Q</div><div class="dsem">S</div><div class="dsem">S</div>${dias}</div></div>`;
}
/* agenda do superintendente: 1 calendário por vez (abas) + lista do que vem aí —
   superintendente pensa em "próximos eventos", não em grade dupla */
function proximasReservas(n){
  const out=[];
  for(const area of Object.keys(reservas))
    for(const [chave,dias] of Object.entries(reservas[area]))
      for(const [d,un] of Object.entries(dias)){
        const m=+chave.split('-')[1], dia=+d;
        if(m<6||(m===6&&dia<10)) continue;
        out.push({area, m, d:dia, un});
      }
  return out.sort((a,b)=>(a.m-b.m)||(a.d-b.d)).slice(0,n);
}

      'Cinema':['Lazer',18,0,'slot','sessões',['Sessão 16h','Sessão 19h','Sessão 21h']],
      'Coworking':['Trabalho',12,0,'slot','08h–20h',['Manhã','Tarde','Noite']],

      regras[nome]={cat, modo, taxa, limite: modo==='exclusiva'?'2 reservas/mês por loja':(modo==='slot'?'1 horário/dia por loja':'sem reserva — acesso livre'), limiteMes:2, antecMin:1, antecMax:60, capacidade:cap, horario, caucao:taxa?Math.round(taxa*1.5):0, noShow: modo==='exclusiva'?'Cancele com 48h de antecedência para liberar a data.':'Cancele com 2h de antecedência para liberar o horário.', bloqueiaInadimplente:false, slots}; reservas[nome]={}; });

/* ===== modos de uso da área: exclusiva (dia) · slot (horário) · livre (sem reserva) ===== */
function modoLabel(m){ return m==='livre'?'Uso livre':m==='slot'?'Reserva por horário':'Reserva por dia'; }
function modoTag(m){ const c=m==='livre'?'cinza':m==='slot'?'laranja':'verde'; return `<span class="chip ${c}" style="border:none">${modoLabel(m)}</span>`; }
let slotDia=0;
function diasProx(){
  return [0,1,2,3,4].map(k=>{ const d=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate()+k);
    const dd=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
    return {k, d:d.getDate(), m:d.getMonth()+1, lbl:(k===0?'Hoje':k===1?'Amanhã':dd)+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')}; });
}
/* reservas por faixa de horário (modo slot): área -> 'ano-mes' -> dia -> { faixa: loja } */
let reservasSlot={};
function slotsHtml(area, clicavel){
  const g=regras[area], slots=g.slots||['08–10','10–12','14–16','16–18','19–21'];
  if(slotDia>4) slotDia=0;
  const dias=diasProx(), dx=dias[slotDia];
  const chave=`${hoje.getFullYear()}-${dx.m}`;
  const ocupadoOutro=(s)=>((area.length+s.length+dx.d)%4===0);
  const minha=(s)=>(((reservasSlot[area]||{})[chave]||{})[dx.d]||{})[s]===MORADOR.un;
  const base='border:none; padding:11px 15px; font-size:.85rem; min-height:44px; border-radius:999px';
  return `<p class="sub" style="margin:2px 0 8px">Reserva por <b>faixa de horário</b>: escolha o dia e a sessão — cada loja pega 1 por dia, e a faixa some pra quem já reservou. Não bloqueia o dia inteiro; as outras lojas usam as outras faixas.</p>
  <div style="display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; margin-bottom:12px">
    ${dias.map(x=>`<button class="chip ${slotDia===x.k?'verde':'cinza'}" style="border:none; flex:0 0 auto; white-space:nowrap; cursor:pointer; min-height:40px" onclick="slotDia=${x.k};atualizar()">${x.lbl}</button>`).join('')}
  </div>
  <div style="display:flex; flex-wrap:wrap; gap:8px">
    ${slots.map(s=>{
      const eMinha=minha(s), oc=!eMinha&&ocupadoOutro(s);
      if(eMinha) return `<button class="chip verde" style="${base}; cursor:${clicavel?'pointer':'default'}; box-shadow:inset 0 0 0 2px var(--verde-escuro)" ${clicavel?`onclick="cancelarSlotPergunta('${area}',${dx.m},${dx.d},'${s}')"`:''}>${tIco('check')}${s} · sua reserva</button>`;
      if(oc) return `<button class="chip cinza" style="${base}; opacity:.5; cursor:default" disabled>${s} · ocupado</button>`;
      return `<button class="chip" style="${base}; background:#fff; color:var(--verde-escuro); box-shadow:inset 0 0 0 1.5px var(--verde); cursor:${clicavel?'pointer':'default'}" ${clicavel?`onclick="pedirSlot('${area}',${dx.m},${dx.d},'${s}')"`:''}>${s}</button>`;
    }).join('')}
  </div>`;
}
function livreHtml(area){
  const g=regras[area], ocup=Math.max(1,Math.round(g.capacidade*0.55));
  const pct=Math.round(ocup/g.capacidade*100), lotChip=pct>=85?'vermelho':pct>=60?'laranja':'verde';
  return `<div class="item" style="border-color:var(--verde); background:var(--verde-claro)">
    <div class="linha1"><span class="nome">${tIco('check')}Acesso livre — sem reserva</span><span class="chip verde" style="border:none">aberto</span></div>
    <div class="sub" style="margin-top:4px; line-height:1.6">${area} é de uso compartilhado no horário <b>${g.horario}</b>, respeitando a capacidade (até ${g.capacidade} pessoas). Não precisa reservar — é só usar e seguir o regulamento.</div>
  </div>
  <div class="item">
    <div class="linha1"><span class="nome">${tIco('pessoas')}Lotação agora</span><span class="chip ${lotChip}" style="border:none">${ocup}/${g.capacidade}</span></div>
    <div style="height:7px; border-radius:6px; background:#e8ece9; margin-top:8px; overflow:hidden"><div style="height:100%; width:${pct}%; background:var(--verde)"></div></div>
    <div class="sub" style="margin-top:6px">Demonstração de ocupação em tempo real (no produto final, via check-in na entrada).</div>
  </div>`;
}
/* corpo da tela conforme o modo da área */
function areaCorpoHtml(area, clicavel){
  const m=(regras[area]||{}).modo||'exclusiva';
  if(m==='livre') return livreHtml(area);
  if(m==='slot') return slotsHtml(area, clicavel);
  return `<div class="legenda"><span class="l1">livre</span><span class="l2">reservado</span></div>${calendario(area, clicavel)}`;
}

/* ===== PORTARIA ===== */
function esperaEnc(ch){
  const m=(ch||'').match(/(\d\d)\/(\d\d)\s+(\d\d):(\d\d)/); if(!m) return {dias:0, hhmm:ch};
  const dt=new Date(hoje.getFullYear(), +m[2]-1, +m[1]);
  const dias=Math.round((new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate())-dt)/86400000);
  return {dias, hhmm:m[3]+':'+m[4]};
}

/* piso primeiro, loja depois: 60 lojas num combo só é rolagem infinita */
function unidadesDaPiso(t){
  const us=[], base=t==='A'?1:4;
  for(let andar=base; andar<base+3; andar++)
    for(let n=1; n<=10; n++) us.push(`${t}-${andar}${String(n).padStart(2,'0')}`);
  return us;
}
function preencherUnidades(idPiso,idUn,selecionada){
  const t=$('#'+idPiso).value.slice(-1);
  $('#'+idUn).innerHTML=unidadesDaPiso(t).map(u=>`<option ${u===selecionada?'selected':''}>${u}</option>`).join('');
}

  const un=$('#ne-un').value, tr=$('#ne-tr').value;
  encomendas.unshift({id:Date.now(), un, lojista:'Lojista(a) '+un, tel:'5511990000010', transp:tr,

function retirar(id){
  const e=encomendas.find(x=>x.id===id);
  /* campo em branco de propósito: quem retira nem sempre é o lojista (filho, empregada, lojista vizinho autorizado) */
  abrirModal(`<h3>Confirmar retirada — ${e.un}</h3>
    <label>Quem está retirando?</label><input id="re-nome" placeholder="Nome de quem está retirando na doca">
    <label>Documento (RG/CPF/CNH)</label><input id="re-doc" placeholder="Ex.: RG 12.345.678-9">
    <button class="btn principal btn-grande" onclick="confirmaRetirada(${id})">Confirmar retirada</button>

function confirmaRetirada(id){
  const nome=$('#re-nome').value.trim(), doc=$('#re-doc').value.trim();
  if(!nome||!doc){ toast('Nome e documento de quem retira são obrigatórios.'); return; }
  const e=encomendas.find(x=>x.id===id);
  e.status='retirada';
  e.retirada=agora()+' — '+nome+' ('+doc+')';
  fecharModal(); atualizar(); toast('Retirada confirmada com registro de quem retirou');
}

/* ===== QR de visitante (roadmap CondoX): lojista autoriza → QR → segurança valida ===== */
function qrSvg(seed,px){
  let h=0; for(const ch of seed) h=(h*31+ch.charCodeAt(0))>>>0;
  const rnd=()=>{h=(h*1103515245+12345)>>>0; return h/4294967296;};
  const n=13; let cells='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const finder=(x<4&&y<4)||(x>=n-4&&y<4)||(x<4&&y>=n-4);
    if(!finder&&rnd()>.52) cells+=`<rect x="${x}" y="${y}" width="1" height="1"/>`;
  }
  const f=(ox,oy)=>`<rect x="${ox+.3}" y="${oy+.3}" width="3.4" height="3.4" fill="none" stroke="currentColor" stroke-width=".8"/><rect x="${ox+1.3}" y="${oy+1.3}" width="1.4" height="1.4"/>`;
  return `<svg viewBox="0 0 ${n} ${n}" width="${px}" height="${px}" fill="currentColor" aria-label="QR Code (simulação)" style="display:block; margin:0 auto">${f(0,0)}${f(n-4,0)}${f(0,n-4)}${cells}</svg>`;
}

/* ALERTA DE RISCO / SAÚDE DO LOJISTA — cruza tendência de vendas (hist) com atraso de aluguel (inadimplentes) */
function riscoLojista(f){
  const h=(f.hist||[]); if(h.length<3) return null;
  const serie = (f.status!=='pendente' && f.valor>0) ? h.concat([{m:'Jun',v:f.valor}]) : h.slice();
  const n=serie.length;
  const last=serie[n-1].v, prev=serie[n-2].v, prev2=serie[n-3].v;
  const drop6 = (last-serie[0].v)/serie[0].v;
  const doisEmQueda = last<prev && prev<prev2;
  const pagaMinimo = last*f.perc < f.minimo;
  const inad = inadimplentes.find(i=>i.un===f.un);
  const dias = inad?inad.dias:0;
  const motivos=[];
  if(drop6<=-0.12) motivos.push(`vendas ${Math.round(drop6*100)}% em 6 meses`);
  if(doisEmQueda) motivos.push('queda em 2+ meses seguidos');
  if(dias>=90) motivos.push(`aluguel ${dias} dias em atraso`);
  else if(dias>=30) motivos.push(`${dias} dias de atraso no aluguel`);
  if(pagaMinimo && drop6<0) motivos.push('vendas já no piso do aluguel mínimo');
  const fortes=(drop6<=-0.20?1:0)+(doisEmQueda?1:0)+(dias>=90?1:0);
  let nivel=null;
  if(fortes>=2 || (dias>=90 && drop6<0)) nivel='alto';
  else if(motivos.length>=2 || dias>=60 || drop6<=-0.12) nivel='medio';
  if(!nivel) return null;
  const acao = nivel==='alto'
    ? 'Conversa de retenção agora: renegociar aluguel/prazo ou já preparar a reposição do ponto.'
    : 'Acompanhar de perto: contato do superintendente e revisão do contrato na próxima janela.';
  return {nivel, motivos, acao, drop6, dias, loja:f.loja, un:f.un, tel:inad?inad.tel:''};
}

/* PAINEL DE DESEMPENHO DO LOJISTA — vendas do mês, tendência, vendas/m² vs média do segmento, custo de ocupação */
function painelDesempenho(f){
  if(!f) return '';
  const area=f.area||100, seg=f.seg||'Geral';
  const closed=(f.hist||[]).slice();
  const declJun = f.status!=='pendente' && f.valor>0;
  const serie = closed.concat([{m:'Jun', v: declJun?f.valor:null}]);
  const vendasRef = declJun ? f.valor : (closed.length?closed[closed.length-1].v:0);
  const mesRef = declJun ? 'Junho/2026' : (closed.length?closed[closed.length-1].m+'/2026':'—');
  const prevV = declJun ? (closed.length?closed[closed.length-1].v:0) : (closed.length>1?closed[closed.length-2].v:0);
  const delta = prevV ? (vendasRef-prevV)/prevV : 0;
  const vm2 = area ? vendasRef/area : 0;
  const bench = benchSeg(seg);
  const dBench = bench ? (vm2-bench)/bench : 0;
  const alugRef = Math.max(f.minimo, Math.round(vendasRef*f.perc));
  const occ = vendasRef ? alugRef/vendasRef : 0;
  const maxV = Math.max(...serie.map(s=>s.v||0), 1);
  const up=delta>=0, bUp=dBench>=0, occOk=occ>0 && occ<=0.15;

    const cur = s.m==='Jun';
    const fill = s.v ? (cur?'var(--verde)':'var(--verde-claro)') : 'transparent';

      <span style="font-size:1.5rem; font-weight:800; line-height:1">${fmt(vendasRef)}</span>
      <span style="font-size:.78rem; color:var(--cinza)">vendas · ${mesRef}</span>
      ${prevV?`<span class="chip ${up?'verde':'vermelho'}" style="border:none; margin-left:auto">${up?'▲':'▼'} ${Math.abs(delta*100).toFixed(0)}% vs mês anterior</span>`:''}
    </div>
    <div style="display:flex; gap:5px; align-items:flex-end; margin:12px 0 2px">${bars}</div>
    ${!declJun?`<div class="sub" style="margin:8px 0 0">Junho ainda não declarado — <button class="chip verde" style="border:none; cursor:pointer" onclick="declararFaturamento()">declarar agora</button> pra fechar o mês.</div>`:''}
    <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap">
      <div style="flex:1 1 44%; border:1px solid var(--borda); border-radius:10px; padding:9px 11px">
        <div class="sub" style="margin:0; font-size:.72rem">Vendas por m²</div>
        <div style="font-weight:800; font-size:1.05rem">${fmt(Math.round(vm2))}<span style="font-size:.68rem; font-weight:500; color:var(--cinza)">/m²</span></div>
        <div class="sub" style="margin:2px 0 0; font-size:.68rem; color:${bUp?'var(--verde-escuro)':'var(--vermelho)'}">${bUp?'▲':'▼'} ${Math.abs(dBench*100).toFixed(0)}% vs média de ${seg}</div>
      </div>

function minhasReservasSlot(){
  const out=[];
  for(const area of Object.keys(reservasSlot))
    for(const [chave,dd] of Object.entries(reservasSlot[area]))

        for(const [s,un] of Object.entries(slots))

function validadeStatus(v){
  if(!v||v==='—') return {label:'por execução', cor:'cinza'};
  const p=v.split('/'); const d=new Date(+p[2],+p[1]-1,+p[0]);
  const dias=Math.round((d-hoje)/86400000);
  if(dias<0) return {label:'vencido', cor:'vermelho'};
  if(dias<=60) return {label:'vence '+v, cor:'laranja'};
  return {label:'válido até '+v, cor:'verde'};
}
function laudoDaManu(m){ return laudos.find(l=>l.manut && (m.item||'').includes(l.manut)); }
function verLaudosArts(){
  const ord=l=>{const c=validadeStatus(l.validade).cor; return c==='vermelho'?0:c==='laranja'?1:c==='verde'?2:3;};
  const lst=[...laudos].sort((a,b)=>ord(a)-ord(b));
  abrirModal(`<h3>${tIco('pasta')}Laudos &amp; ARTs técnicos</h3>
    <div class="sub" style="margin-bottom:10px">Documentos de responsabilidade técnica recebidos — <b>ART</b>, <b>laudo</b> e <b>certificado</b>, com o responsável (CREA/CFT) e a validade. O ${nomeAssist} sabe quais obras exigem ART e avisa quando faltar ou vencer.</div>
    ${lst.map(l=>{const s=validadeStatus(l.validade); const i=laudos.indexOf(l);
      return `<button class="item" style="width:100%; text-align:left; display:block" onclick="abrirLaudoDoc(${i})">
      <div class="linha1"><span class="nome" style="font-size:.92rem"><span class="chip cinza" style="border:none; margin-right:5px">${l.tipo}</span>${l.titulo}</span><span class="chip ${s.cor}">${s.label} ›</span></div>
      <div class="sub" style="margin-top:3px">${l.resp} · ${l.crea} · emitido ${l.emitido} · ${l.norma}</div></button>`;}).join('')}

}
function abrirLaudoDoc(i){
  const l=laudos[i]; if(!l) return;
  const info=`Responsável: ${l.resp} (${l.crea}) · emitido ${l.emitido} · validade ${l.validade==='—'?'por execução':l.validade} · norma ${l.norma}${l.manut?' · manutenção: '+l.manut:''}`;
  verDoc(`${l.tipo} — ${l.titulo}`, info);
}

let assinatura=null;    // pedido de assinatura em curso

function enviarParaAssinatura(titulo, tipoKey){
  assinatura={titulo, tipoKey, provedor:'Clicksign',
    signatarios:[{nome:'Roberto Alves', papel:'Superintendente · Presidente da mesa', status:''},
                 {nome:'Mariana Dias',  papel:'Secretária',                    status:''}]};

function verAssinatura(){
  const a=assinatura; if(!a) return; const t=TIPO_ASSINATURA[a.tipoKey]||TIPO_ASSINATURA.ata;
  const faltam=a.signatarios.filter(s=>!s.status).length;
  abrirModal(`<h3>${tIco('contrato')}Enviar para assinatura</h3>
    <div class="sub" style="margin-bottom:8px"><b>${a.titulo}</b> · via ${a.provedor}</div>

function assinarComo(ix){
  assinatura.signatarios[ix].status='assinou · '+agora();
  logAudit(`assinou digitalmente "${assinatura.titulo}" (${assinatura.signatarios[ix].papel})`, assinatura.signatarios[ix].nome.split(' ')[0]);
  verAssinatura();
}
function concluirAssinatura(){
  const a=assinatura, t=TIPO_ASSINATURA[a.tipoKey]||TIPO_ASSINATURA.ata;
  docsAssinados.unshift({titulo:a.titulo, info:`assinada ${hojeData()} · ${a.provedor} · ${t.rot} · ${a.signatarios.length} signatários`});
  logAudit(`arquivou no acervo a ata assinada: "${a.titulo}"`,'Superintendente');
  assinatura=null; fecharModal(); atualizar();
  toast('Assinada e arquivada no acervo (Documentos).');
}

function quorumItem(p, presN){
  const m=(p.q||'').match(/(\d+)\s*loja/);          // quórum absoluto declarado no item (ex.: "31 lojas")
  if(m) return {req:+m[1], base:'absoluta'};
  return {req:Math.floor(presN/2)+1, base:'presentes'}; // senão, maioria dos presentes
}
/* apuração HÍBRIDA: presenciais (steppers) + remotos (votoRemoto do app) */
function remotosTally(i){
  const t={sim:0,nao:0,abst:0};
  Object.values(assembleia.votoRemoto||{}).forEach(v=>{const e=v[i]; if(e&&t[e]!==undefined) t[e]++;});
  return t;
}
function remotosCount(){ return Object.keys(assembleia.votoRemoto||{}).length; }
function procuracoesCount(){ return Object.keys(assembleia.procuracoes||{}).length; }
function presentesEfetivo(){ return assembleia.presentesN + remotosCount(); } // voto remoto vale como presença
function votosItem(i){
  const p=assembleia.votos[i]||{sim:0,nao:0,abst:0}, r=remotosTally(i);
  return {sim:p.sim+r.sim, nao:p.nao+r.nao, abst:p.abst+r.abst, rem:r};
}
function statusItem(i){
  const p=assembleia.pauta[i], v=votosItem(i);
  const {req,base}=quorumItem(p, presentesEfetivo());
  const total=v.sim+v.nao+v.abst;
  const nRem=v.rem.sim+v.rem.nao+v.rem.abst, remNote=nRem?` · inclui ${nRem} remoto(s)`:'';
  if(!total) return {chip:['sem votos','cinza'], hint:`Quórum: ${base==='absoluta'?'maioria absoluta — '+req+' un.':'maioria dos presentes ('+req+' de '+presentesEfetivo()+')'}`};
  if(v.sim>v.nao){
    if(base==='absoluta'&&v.sim<req) return {chip:[`faltam ${req-v.sim} p/ ${req}`,'laranja'], hint:`Maioria, mas abaixo da maioria absoluta exigida (o estatuto da associação e a escritura de normas)${remNote}.`};
    return {chip:['aprovado','verde'], hint:`${v.sim} a favor · quórum atingido (${req})${remNote}`};
  }
  return {chip:['reprovado','vermelho'], hint:`${v.nao} contra ≥ ${v.sim} a favor${remNote}`};
}
function avaliarFinal(p,v,presN){
  const {req,base}=quorumItem(p,presN);
  const nRem=v.rem?(v.rem.sim+v.rem.nao+v.rem.abst):0, remTxt=nRem?` — inclui ${nRem} voto(s) remoto(s)`:'';
  const aprovadoSala=v.sim>v.nao;
  if(base==='absoluta'&&aprovadoSala&&v.sim<req)
    return {flag:true, resultado:`Aprovado em votação (${v.sim} a favor, ${v.nao} contra, ${v.abst} abst.${remTxt}) — porém SEM quórum.`, msg:`exige maioria absoluta de ${req} lojas (o estatuto da associação e a escritura de normas), mas teve ${v.sim} votos. Deliberação anulável: reapresente com quórum ou registre a ressalva em ata.`};
  if(aprovadoSala) return {flag:false, resultado:`Aprovado (${v.sim} a favor, ${v.nao} contra, ${v.abst} abst.${remTxt}).`};
  return {flag:false, resultado:`Reprovado (${v.sim} a favor, ${v.nao} contra, ${v.abst} abst.${remTxt}).`};
}

function _ddmm(s){const m=(s||'').match(/(\d\d)\/(\d\d)/); return m?new Date(hoje.getFullYear(),+m[2]-1,+m[1]):null;}
function estadoVotacao(){
  const j=assembleia.votoJanela;
  if(j.forcar==='abrir') return 'aberta';

  const h=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
  const ab=_ddmm(j.abre), fe=_ddmm(j.fecha);

}

function marcarRotina(ix){
  const r=rotina[ix];

    abrirModal(`<h3>${r.t}</h3>

function confirmarScan(ix){
  const r=rotina[ix];
  if(r.t.toLowerCase().includes('leitura')){ const el=$('#rt-v'); const v=el&&el.value.trim(); if(!v){ toast('Informe o valor da leitura.'); return; } r.leitura=v; }
  r.feito=true; r.local=true; r.hora=agora();
  if(typeof logAudit==='function') logAudit('confirmou "'+r.t+'" no local (QR) '+agora(), r.resp||'Facilities');
  fecharModal(); atualizar(); toast('Confirmado no local (QR) — '+agora());
}
function confirmarLeitura(ix){
  const v=$('#rt-v').value.trim();
  if(!v){ toast('Informe o valor — leitura sem número não detecta vazamento.'); return; }
  rotina[ix].feito=true; rotina[ix].leitura=v; rotina[ix].local=false;
  fecharModal(); atualizar(); toast('Leitura registrada (manual)');
}

/* ===== "PRA AGIR" — caixa única de pendências do superintendente (aprovar/responder/delegar de um lugar só) ===== */
function praAgir(){
  const itens=[];
  manutencoes.forEach((m,ix)=>{ if(m.status==='aprovacao') itens.push({cor:'laranja', tit:`Conferir laudo — ${nomeManu(m)}`, ctx:'O facilities arquivou o laudo; sua aprovação fecha o item.', acao:'Aprovar', fn:`aprovarDaFila(${ix})`, sec:'Ver', secfn:`fecharModal();verManutencao(${ix})`}); });
  ocorrencias.forEach(o=>{ if(o.tipo==='Reforma' && o.status!=='resolvida' && o.status!=='em execução') itens.push({cor:'laranja', tit:`Aprovar reforma — ${o.un}`, ctx:o.titulo, acao:'Abrir', fn:`fecharModal();verOcorrencia(${o.id})`}); });
  ocorrencias.forEach(o=>{ if(o.tipo!=='Reforma' && o.status!=='resolvida' && !o.resposta) itens.push({cor:'laranja', tit:`Responder — ${o.titulo}`, ctx:`${o.un} · ${o.tipo}`, acao:'Responder', fn:`fecharModal();verOcorrencia(${o.id})`, sec:'Rascunho Gi', secfn:`rascunhoEdi('resposta',${o.id})`}); });
  if(typeof compra!=='undefined' && compra.status!=='aprovada') itens.push({cor:'acao', tit:'Revisar cotações do facilities', ctx:'2-3 orçamentos por escrito prontos pra sua decisão.', acao:'Revisar', fn:`fecharModal();irPara('compras')`});
  if(!provaReconhecida) itens.push({cor:'verde', tit:'Dar visto na operação do facilities', ctx:'Reconheça o que ele já fez e registrou hoje.', acao:'Ver e dar visto', fn:`fecharModal();verProvaSindico()`});
  if(!assembleia.convocada) itens.push({cor:'acao', tit:'Convocar a assembleia 25/06', ctx:'Pauta minutada — falta convocar pelos canais.', acao:'Convocar', fn:`fecharModal();irPara('assembleia')`, sec:'Rascunho Gi', secfn:`rascunhoEdi('convocacao')`});
  return itens;
}
function praAgirCard(){
  const n=praAgir().length;
  return `<button class="item" style="width:100%; text-align:left; display:block; margin:2px 0 6px; border-left:3px solid var(--verde)" onclick="verPraAgir()">
    <div class="linha1"><span class="nome">${tIco('check')}Pra agir</span><span class="chip ${n?'laranja':'verde'}">${n?n+' pendência'+(n>1?'s':''):'tudo em dia'} ›</span></div>
    <div class="sub" style="margin-top:5px">Tudo que depende de você num lugar — aprove, responda ou delegue de uma vez. No produto final chega no seu WhatsApp toda segunda.</div></button>`;
}
function verPraAgir(){
  const itens=praAgir();
  const cardC=c=>c==='acao'?'gold':c;
  const d=resumoSemanaDados();
  const lista=a=>a.slice(0,3).join(' · ')+(a.length>3?` +${a.length-3}`:'');
  const pano=(cor,ico,titulo,arr,acao)=> arr.length?`<button class="item" style="width:100%; text-align:left; display:block; border-left:3px solid var(--${cor})" onclick="fecharModal();${acao}">
      <div class="linha1"><span class="nome" style="font-size:.92rem">${tIco(ico)}${titulo}</span><span style="display:flex; align-items:center; gap:6px"><span class="chip ${cor==='vermelho'?'vermelho':'laranja'}">${arr.length}</span><span style="color:var(--cinza)">›</span></span></div>
      <div class="sub" style="margin-top:4px">${lista(arr)}</div></button>`:'';
  /* panorama = categorias de acompanhamento que NÃO têm ação inline (não duplicam a fila acima) */
  const risco=faturamentos.map(riscoLojista).filter(Boolean);
  const riscoArr=risco.map(r=>r.loja);
  const panorama=[
    pano('vermelho','alerta','Manutenção vencida',d.venc,"filtroManuStatus='Vencidas';irPara('manutencao')"),
    pano('laranja','calendario','Vencendo em 30 dias',d.breve,"filtroManuStatus='Vencendo';irPara('manutencao')"),
    pano('vermelho','cifrao','Inadimplência +60 dias',d.inad,"irPara('inadimplencia')"),
    pano(risco.some(r=>r.nivel==='alto')?'vermelho':'laranja','grafico','Lojistas em risco de saída',riscoArr,"irPara('faturamento')"),
    (()=>{const rv=contratosLoc.map(c=>({c,m:mesesAte(c.fim)})).filter(x=>x.c.status!=='indeterminado'&&x.m!==null&&x.m>=0&&x.m<=12);return pano(rv.some(x=>x.m<=6)?'vermelho':'laranja','contrato','Renovatória — janela aberta',rv.map(x=>`${x.c.loja} (${x.m}m)`),"irPara('contratos')");})(),
    pano('laranja','contrato','Contratos de prestador vencendo',d.contr,"irPara('fornecedores')"),
  ].filter(Boolean).join('');
  let zt=`Resumo da semana — ${COND.nome}:`;
  if(d.venc.length) zt+=`\n- Manutenção vencida (${d.venc.length}): ${d.venc.join(', ')}`;
  if(d.aprov.length) zt+=`\n- Laudos a conferir (${d.aprov.length}): ${d.aprov.join(', ')}`;
  if(d.breve.length) zt+=`\n- Vencendo em 30 dias (${d.breve.length})`;
  if(d.inad.length) zt+=`\n- Inadimplência +60 dias (${d.inad.length}): ${d.inad.join(', ')}`;
  if(d.ocAg.length) zt+=`\n- Ocorrências aguardando você (${d.ocAg.length})`;
  if(d.contr.length) zt+=`\n- Contratos vencendo (${d.contr.length}): ${d.contr.join(', ')}`;
  if(!itens.length&&!panorama) zt+=`\nTudo em dia esta semana.`;
  abrirModal(`<h3>${tIco('check')}Pra agir — ${itens.length}</h3>
    <div class="sub" style="margin-bottom:10px">${itens.length?'Resolva de uma vez: aprovar, responder ou abrir. Some da fila ao concluir.':'Nada pra aprovar ou responder agora.'}</div>
    ${itens.map(i=>`<div class="item" style="border-left:3px solid var(--${cardC(i.cor)})">
      <div class="linha1"><span class="nome" style="font-size:.95rem">${i.tit}</span></div>
      <div class="sub" style="margin-top:3px">${i.ctx}</div>
      <div class="botoes" style="justify-content:flex-end; margin-top:8px">
        ${i.sec?`<button class="btn claro" style="flex:0 0 auto; padding:8px 13px; font-size:13px" onclick="${i.secfn}">${i.sec}</button>`:''}
        <button class="btn principal" style="flex:0 0 auto; padding:8px 13px; font-size:13px" onclick="${i.fn}">${i.acao}</button>
      </div></div>`).join('')}
    ${panorama?`<div class="secao" style="margin-top:4px">PANORAMA DA SEMANA</div>${panorama}`:''}
    ${(!itens.length&&!panorama)?vazio('check','Tudo em dia','Sem pendências que dependam de você agora.'):''}
    <div class="botoes" style="margin-top:12px"><a class="btn zap btn-grande" style="display:block" target="_blank" href="https://wa.me/?text=${encodeURIComponent(zt)}">Enviar resumo no meu WhatsApp</a></div>
    <div class="aviso-lgpd">No produto final, esse resumo chega sozinho toda segunda no seu WhatsApp — você abre o app só pra agir.</div>`);
}

/* rascunho do Gi contextual: para ocorrência, responde com base na regra (não um "estou verificando" genérico) */
function rascunhoResposta(o){
  const nome=(o&&(lojas[o.un]&&lojas[o.un].ocupante||o.un)||'').split(' ')[0];
  const t=((o&&(o.titulo+' '+(o.desc||'')))||'').toLowerCase();
  if(o && /barulho|festa|som|23h|22h|silên|perturba/.test(t))
    return {fonte:'Regimento interno — silêncio das 22h às 8h', fora:false,
      txt:`Olá, ${nome}! Recebi sua reclamação sobre o barulho após as 23h. O regimento fixa silêncio das 22h às 8h, então a loja responsável vai ser notificada formalmente; havendo reincidência, cabe advertência e multa conforme o contrato de locação. Já registrei e te aviso do desfecho pelo app. — Superintendente, ${COND.nome}`};
  if(o && /vazamento|infiltra|pingando|água|umidade|goteira/.test(t))
    return {fonte:'Contrato de locação — reparo por quem deu causa (espaço comercial × loja)', fora:false,
      txt:`Olá, ${nome}! Sobre o vazamento: o facilities vai verificar a origem ainda hoje. Se vier de coluna ou espaço comercial, o shopping resolve; se for de uma loja, acionamos o responsável — a reparação é de quem deu causa. Volto com o diagnóstico e o prazo do reparo. — Superintendente, ${COND.nome}`};
  if(o && o.tipo==='Sugestão')
    return {fonte:'Decisão coletiva — pauta de assembleia', fora:false,
      txt:`Olá, ${nome}! Boa sugestão. Como envolve gasto coletivo, vou levá-la à pauta da próxima assembleia pra o shopping decidir. Registrei no sistema e te aviso do resultado. — Superintendente, ${COND.nome}`};
  /* fora das fontes: não afirma nada — dá só o encaminhamento, honesto */
  return {fonte:'', fora:true,
    txt:`Olá${nome?', '+nome:''}! Recebi sua ${o?o.tipo.toLowerCase():'solicitação'}${o?` sobre "${o.titulo}"`:''}. Vou verificar${o&&o.tipo==='Reclamação'?' com o facilities':''} e te dou um retorno em até 48h, pelo app e no WhatsApp. Obrigado por avisar. — Superintendente, ${COND.nome}`};
}
function rascunhoEdi(assunto, ocId){
  let txt='', fonte='', fora=false;
  if(assunto==='convocacao'){
    txt=`CONVOCAÇÃO — Assembleia Geral Ordinária · ${COND.nome}\n25/06/2026 · 19h30 (1ª chamada) / 20h (2ª), no espaço promocional.\nPauta: 1) prestação de contas; 2) eleição do conselho da associação; 3) assuntos gerais.\nQuem não puder comparecer vota pelo app ou envia procuração.\n— Superintendente`;
    fonte='Convocação alcançando todos (o estatuto da associação)';
  } else {
    const o=ocorrencias.find(x=>x.id===ocId);
    const r=rascunhoResposta(o); txt=r.txt; fonte=r.fonte; fora=r.fora;
  }
  abrirModal(`<h3>${tIco('robo')}Rascunho do ${nomeAssist}</h3>
    <div class="sub" style="margin-bottom:8px">${fora

    <div class="item" style="white-space:pre-wrap; font-size:.9rem; line-height:1.55">${txt}${fonte?`<br><span style="font-size:.78rem; color:var(--verde-escuro); font-weight:700; display:inline-block; margin-top:8px; white-space:normal">${clip()}${fonte}</span>`:''}</div>

/* ===== CONTRATOS DE LOCAÇÃO & RENOVATÓRIA (superintendente) ===== */
function avalContrato(c){
  const cur=hoje.getMonth()+1;
  const m=mesesAte(c.fim);
  const direito = c.prazoMeses>=60 && c.status!=='indeterminado';
  let nivel, chip, nota;
  if(c.status==='indeterminado'){
    nivel=2; chip=['cinza','prazo indeterminado'];
    nota='O prazo determinado terminou — o contrato vigora por prazo indeterminado. Cabe denúncia vazia com 30 dias (art. 57); não há renovatória automática.';
  } else if(m<0){
    nivel=0; chip=['vermelho','vencido'];
    nota='Contrato vencido — regularizar a renovação ou retomar o ponto.';

}

  for(let m=calMes;m<=9;m++){
    const chave=`2026-${m}`, oc=reservas[area][chave]||{}, tot=new Date(2026,m,0).getDate();
    for(let d=1;d<=tot;d++){
      if(m===6 && d<=10) continue;
      if(new Date(2026,m-1,d).getDay()!==dow) continue;
      if(!oc[d]) return {d,m};

function ediResponder(q){

      lojista:'reservar espaços comerciais, ver a 2ª via / PIX dos encargos, acompanhar entregas na doca e tirar dúvida do regimento',

    return {t:`Tô aqui pra isso. Precisando de qualquer coisa, é só me chamar.`};

    if(ql.includes('venc')||ql.includes('manuten')||ql.includes('prazo')){

      return {t:v.length?`${v.length} item(ns) com prazo legal vencido: ${v.map(m=>m.item).join(' ·')}. Recomendo resolver esta semana.`:'Nenhum prazo legal vencido.',
        html:(v.length&&perfil==='sindico')?`<div class="botoes"><button class="btn principal" onclick="irPara('manutencao')">Ver manutenções</button></div>`:''};
    }
  }
  if(perfil==='portaria'){
    if(ql.includes('autoriz')||ql.includes('eletricista')||ql.includes('prestador')||ql.includes('visita')){
      const num=(ql.match(/\d{3}/)||[])[0];
      const v=visitantes.find(x=>x.status==='pré-autorizado'&&(!num||x.un.includes(num)));
      return v?{t:`Sim: ${v.nome} está pré-autorizado pelo ${v.un}. Registre a entrada com o documento.`,

        :{t:'Não encontrei autorização prévia pra isso. Sem autorização do lojista, não passa do controle de acesso — chame no interfone.'};
    }
    if(ql.includes('mercadoria')){
      const num=(ql.match(/\d{3}/)||[])[0];
      const e=encomendas.find(x=>x.status==='aguardando'&&(!num||x.un.includes(num)));
      return e?{t:`Tem: ${e.un} — ${e.transp}, chegou ${e.chegada}, aguardando retirada.`}
              :{t:`Nenhuma mercadoria aguardando${num?` pro ${num}`:''}.`};
    }
  }
  if((perfil==='facilities'||perfil==='portaria') && /(conta|balancete|financeiro|fundo|despesa|arrecada|inadimpl|or[çc]ado)/.test(ql))
    return {t:'As contas do shopping ficam com o superintendente e o conselho da associação — seu acesso é a parte operacional (rotina, manutenção, estoque). Posso te ajudar com algo do dia a dia?'};

    const hit=TRIAGEM.find(t=>t.chaves.some(c=>ql.includes(c)));

      html:`<div class="botoes"><button class="btn principal" onclick="irPara('triagem')">Abrir triagem completa</button></div>`};
  }
  const hit=REGRAS_BASE.find(b=>b.chaves.some(c=>ql.includes(c)));
  if(hit) return {t:hit.r, fonte:hit.fonte};
  return {t:'Essa eu não sei — e prefiro não inventar. No produto final eu leio o contrato de locação e o regimento reais do shopping. Quer que eu encaminhe pro superintendente com o contexto?',
    html:perfil==='lojista'?`<div class="botoes"><button class="btn principal" onclick="ediMandarSindico()">${tIco('balao')}Mandar pro superintendente</button></div>`:''};
